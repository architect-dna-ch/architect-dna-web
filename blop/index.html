<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>GRID — Light Cycles 2070</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#00f5ff;--a1:#ff2d6b;--a2:#ffcc00;--a3:#7c6cfa;--bg:#020208}
body{background:var(--bg);overflow:hidden;font-family:'SF Mono','Fira Code',monospace;touch-action:none;color:#fff;user-select:none}
canvas{display:block;position:fixed;inset:0;width:100%;height:100%}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:flex-start;justify-content:space-between;padding:20px 24px;pointer-events:none;z-index:5}
.riders{display:flex;gap:10px}
.rider-dot{
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.5);border-radius:4px;padding:6px 12px;
  border:1px solid rgba(255,255,255,.06);font-size:11px;letter-spacing:.1em;
}
.rd{width:8px;height:8px;border-radius:50%}
.rscore{font-weight:900;font-size:14px;margin-left:2px}
.round-info{text-align:right}
.round-label{font-size:8px;letter-spacing:.28em;color:rgba(255,255,255,.3);text-transform:uppercase}
.round-val{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.02em}

/* ── OVERLAY ── */
#overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:10;transition:opacity .5s;
  background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(0,10,30,.97),rgba(2,2,8,.99));
}
#overlay.gone{opacity:0;pointer-events:none}

.ov-eyebrow{font-size:9px;letter-spacing:.4em;color:rgba(0,245,255,.35);text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.ov-eyebrow::before,.ov-eyebrow::after{content:'';display:block;width:40px;height:1px;background:rgba(0,245,255,.15)}
.ov-title{
  font-size:clamp(72px,15vw,140px);font-weight:900;letter-spacing:-.06em;line-height:.88;
  margin-bottom:6px;position:relative;
  background:linear-gradient(135deg,var(--p) 0%,rgba(0,245,255,.6) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.ov-glow{
  position:absolute;inset:0;
  background:linear-gradient(135deg,var(--p),transparent);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:blur(16px);opacity:.5;pointer-events:none;
}
.ov-sub{font-size:11px;color:rgba(255,255,255,.22);letter-spacing:.24em;text-transform:uppercase;margin-bottom:48px}

.ov-riders{display:flex;gap:24px;margin-bottom:48px}
.ov-rider{text-align:center}
.ov-bike{font-size:32px;margin-bottom:6px;filter:drop-shadow(0 0 12px currentColor)}
.ov-rname{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35)}

.ov-controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:48px;width:300px}
.ctrl{background:rgba(0,245,255,.04);border:1px solid rgba(0,245,255,.1);border-radius:4px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.ckey{background:rgba(0,245,255,.1);border:1px solid rgba(0,245,255,.2);border-radius:3px;padding:3px 9px;font-size:10px;color:var(--p)}
.cdesc{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.06em}

.ov-cta{
  background:transparent;border:1px solid var(--p);color:var(--p);
  font-size:10px;font-weight:700;letter-spacing:.25em;padding:16px 56px;border-radius:4px;
  cursor:pointer;transition:all .2s;font-family:inherit;text-transform:uppercase;
}
.ov-cta:hover{background:rgba(0,245,255,.06);box-shadow:0 0 32px rgba(0,245,255,.2);transform:translateY(-1px)}

/* ── RESULT ── */
#result{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9;opacity:0;pointer-events:none;transition:opacity .45s;
  background:rgba(2,2,8,.85);backdrop-filter:blur(8px);text-align:center;
}
#result.show{opacity:1;pointer-events:all}
.res-eyebrow{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:rgba(0,245,255,.4);margin-bottom:14px}
#res-winner{font-size:clamp(36px,7vw,72px);font-weight:900;letter-spacing:-.04em;margin-bottom:6px}
#res-sub{font-size:13px;color:rgba(255,255,255,.35);letter-spacing:.1em;margin-bottom:36px}

/* ── COUNTDOWN ── */
#countdown{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:8;pointer-events:none;opacity:0;transition:opacity .2s;
}
#countdown.show{opacity:1}
.cdnum{font-size:clamp(120px,25vw,240px);font-weight:900;letter-spacing:-.06em;color:var(--p);
  text-shadow:0 0 80px rgba(0,245,255,.5);animation:cdpop .6s cubic-bezier(.34,1.36,.64,1)}
@keyframes cdpop{0%{transform:scale(1.4);opacity:0}100%{transform:scale(1);opacity:1}}

/* ── TOUCH ZONES ── */
#touch-hint{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:.18em;color:rgba(255,255,255,.18);text-transform:uppercase;
  pointer-events:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="riders" id="riders-hud"></div>
  <div class="round-info">
    <div class="round-label">Round</div>
    <div class="round-val" id="round-val">1 / 5</div>
  </div>
</div>

<div id="countdown"><div class="cdnum" id="cdnum">3</div></div>

<div id="overlay">
  <div class="ov-eyebrow">Light Cycles · 2070</div>
  <div class="ov-title">GRID<div class="ov-glow">GRID</div></div>
  <div class="ov-sub">architect-dna.ch · last cycle standing</div>
  <div class="ov-riders">
    <div class="ov-rider"><div class="ov-bike" style="color:var(--p)">🏍</div><div class="ov-rname" style="color:var(--p)">You</div></div>
    <div class="ov-rider"><div class="ov-bike" style="color:var(--a1)">🏍</div><div class="ov-rname" style="color:var(--a1)">Rinzler</div></div>
    <div class="ov-rider"><div class="ov-bike" style="color:var(--a2)">🏍</div><div class="ov-rname" style="color:var(--a2)">Clu</div></div>
    <div class="ov-rider"><div class="ov-bike" style="color:var(--a3)">🏍</div><div class="ov-rname" style="color:var(--a3)">Sark</div></div>
  </div>
  <div class="ov-controls">
    <div class="ctrl"><span class="ckey">↑ ↓ ← →</span><span class="cdesc">Turn</span></div>
    <div class="ctrl"><span class="ckey">WASD</span><span class="cdesc">Turn</span></div>
    <div class="ctrl"><span class="ckey">Swipe</span><span class="cdesc">Mobile turn</span></div>
    <div class="ctrl"><span class="ckey">Goal</span><span class="cdesc">Outlast all</span></div>
  </div>
  <button class="ov-cta" onclick="startMatch()">Enter Grid</button>
</div>

<div id="result">
  <div class="res-eyebrow">▸ Round Complete</div>
  <div id="res-winner">You Win</div>
  <div id="res-sub">Cycle derezzed</div>
  <button class="ov-cta" onclick="nextRound()" id="res-btn" style="margin-top:0">Next Round</button>
</div>

<div id="touch-hint">Swipe to turn · outlast all</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,CELL;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  CELL=Math.min(W,H)/60;
}
resize();window.addEventListener('resize',resize);

// ── AUDIO ──────────────────────────────────────────────────────────────────
let aCtx;
function ensureAudio(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();}
function beep(freq,dur,vol=.2,type='square'){
  ensureAudio();
  const o=aCtx.createOscillator(),g=aCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,aCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,aCtx.currentTime+dur);
  o.connect(g);g.connect(aCtx.destination);
  o.start();o.stop(aCtx.currentTime+dur);
}
function derezSound(){
  ensureAudio();
  const o=aCtx.createOscillator(),g=aCtx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(400,aCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(50,aCtx.currentTime+.3);
  g.gain.setValueAtTime(.2,aCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,aCtx.currentTime+.3);
  o.connect(g);g.connect(aCtx.destination);
  o.start();o.stop(aCtx.currentTime+.4);
}

// ── GRID BACKGROUND ────────────────────────────────────────────────────────
let gridPulse=0;
function drawGrid(){
  ctx.fillStyle='#020208';ctx.fillRect(0,0,W,H);

  // perspective grid floor
  const gs=CELL*2;
  ctx.save();
  ctx.globalAlpha=.06+Math.sin(gridPulse)*.015;
  ctx.strokeStyle='#00f5ff';ctx.lineWidth=.8;

  // horizontal lines
  for(let y=0;y<H+gs;y+=gs){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  // vertical lines
  for(let x=0;x<W+gs;x+=gs){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  ctx.restore();

  // border walls
  const bw=4;
  ctx.strokeStyle='rgba(0,245,255,.5)';ctx.lineWidth=bw;
  ctx.shadowColor='#00f5ff';ctx.shadowBlur=12;
  ctx.strokeRect(bw/2,bw/2,W-bw,H-bw);
  ctx.shadowBlur=0;
}

// ── CYCLES ────────────────────────────────────────────────────────────────
const CONFIGS=[
  {name:'You',  color:'#00f5ff',ai:false,startFn:()=>({x:W*.25,y:H*.5, dx:1,dy:0})},
  {name:'Rinzler',color:'#ff2d6b',ai:true, startFn:()=>({x:W*.75,y:H*.5, dx:-1,dy:0})},
  {name:'Clu',  color:'#ffcc00',ai:true, startFn:()=>({x:W*.5, y:H*.25,dx:0,dy:1})},
  {name:'Sark', color:'#7c6cfa',ai:true, startFn:()=>({x:W*.5, y:H*.75,dx:0,dy:-1})},
];

let cycles=[],speed,gameRunning=false;
const MARGIN=40;

function makeCycle(cfg){
  const s=cfg.startFn();
  return{
    ...cfg,
    x:s.x,y:s.y,dx:s.dx,dy:s.dy,
    trail:[{x:s.x,y:s.y}],
    alive:true,
    derezParticles:[],
  };
}

function initCycles(){
  speed=CELL*1.2;
  cycles=CONFIGS.map(makeCycle);
}

// ── AI ─────────────────────────────────────────────────────────────────────
function aiTurn(c){
  // look ahead and pick safest turn
  const dirs=[{dx:c.dx,dy:c.dy},{dx:-c.dy,dy:c.dx},{dx:c.dy,dy:-c.dx}];
  // don't go backward
  const scored=dirs.map(d=>{
    let score=0;
    // simulate 8 steps
    let nx=c.x,ny=c.y;
    for(let i=1;i<=8;i++){
      nx+=d.dx*CELL;ny+=d.dy*CELL;
      if(nx<MARGIN||nx>W-MARGIN||ny<MARGIN||ny>H-MARGIN){score-=10;break;}
      for(const oc of cycles){
        for(const tp of oc.trail){
          if(Math.abs(tp.x-nx)<CELL*.7&&Math.abs(tp.y-ny)<CELL*.7){score-=8;break;}
        }
      }
      score+=i; // prefer longer paths
    }
    return{d,score};
  });
  scored.sort((a,b)=>b.score-a.score);
  const best=scored[0].d;
  // apply with some randomness to keep AI imperfect
  if(Math.random()<.88){c.dx=best.dx;c.dy=best.dy;}
}

// ── COLLISION ──────────────────────────────────────────────────────────────
function checkCollisions(){
  for(const c of cycles){
    if(!c.alive) continue;
    // wall
    if(c.x<MARGIN||c.x>W-MARGIN||c.y<MARGIN||c.y>H-MARGIN){
      derez(c);continue;
    }
    // trails
    for(const oc of cycles){
      const trail=oc.trail;
      const skipLast=oc===c?8:0;
      for(let i=0;i<trail.length-skipLast;i++){
        const t=trail[i];
        if(Math.abs(t.x-c.x)<CELL*.55&&Math.abs(t.y-c.y)<CELL*.55){
          derez(c);break;
        }
      }
    }
  }
}

function derez(c){
  c.alive=false;
  derezSound();
  // spawn particles
  for(let i=0;i<40;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=Math.random()*CELL*2+CELL;
    c.derezParticles.push({x:c.x,y:c.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,r:Math.random()*CELL*.6+CELL*.2});
  }
  checkRoundEnd();
}

// ── SCORING ────────────────────────────────────────────────────────────────
let scores=[0,0,0,0],round=1,totalRounds=5,matchRunning=false;

function checkRoundEnd(){
  const alive=cycles.filter(c=>c.alive);
  if(alive.length<=1){
    gameRunning=false;
    const winner=alive[0]||cycles[cycles.length-1];
    const widx=cycles.indexOf(winner);
    if(widx>=0) scores[widx]++;
    setTimeout(()=>showRoundResult(winner),800);
  }
}

function showRoundResult(winner){
  const el=document.getElementById('result');
  const isPlayer=winner&&!winner.ai;
  const isFinal=round>=totalRounds;

  if(isFinal){
    const maxScore=Math.max(...scores);
    const playerWon=scores[0]===maxScore;
    document.getElementById('res-winner').textContent=playerWon?'🏆 VICTORY':'GAME OVER';
    document.getElementById('res-winner').style.color=playerWon?'#00f5ff':'#ff2d6b';
    document.getElementById('res-sub').textContent=`Final score: ${scores[0]}-${Math.max(...scores.slice(1))}`;
    document.getElementById('res-btn').textContent='Play Again';
    document.getElementById('res-btn').onclick=startMatch;
  } else {
    document.getElementById('res-winner').textContent=winner?(winner.ai?`${winner.name} Wins`:'You Win'):'Draw';
    document.getElementById('res-winner').style.color=winner?winner.color:'#fff';
    document.getElementById('res-sub').textContent=`Round ${round} of ${totalRounds} · Score: ${scores[0]}-${Math.max(...scores.slice(1))}`;
    document.getElementById('res-btn').textContent='Next Round';
    document.getElementById('res-btn').onclick=nextRound;
  }
  el.classList.add('show');
  updateHUD();
}

function updateHUD(){
  const hudEl=document.getElementById('riders-hud');
  hudEl.innerHTML=cycles.map((c,i)=>`
    <div class="rider-dot" style="border-color:${c.color}22;opacity:${c.alive||!gameRunning?1:.4}">
      <div class="rd" style="background:${c.color};box-shadow:0 0 6px ${c.color}"></div>
      <span style="color:${c.color};font-size:10px">${c.name}</span>
      <span class="rscore" style="color:${c.color}">${scores[i]}</span>
    </div>
  `).join('');
  document.getElementById('round-val').textContent=`${round} / ${totalRounds}`;
}

// ── DRAW ───────────────────────────────────────────────────────────────────
function drawCycles(){
  for(const c of cycles){
    // trail
    if(c.trail.length>1){
      ctx.shadowColor=c.color;ctx.shadowBlur=8;
      ctx.strokeStyle=c.color+'cc';ctx.lineWidth=CELL*.55;
      ctx.lineCap='square';
      ctx.beginPath();
      ctx.moveTo(c.trail[0].x,c.trail[0].y);
      for(let i=1;i<c.trail.length;i++) ctx.lineTo(c.trail[i].x,c.trail[i].y);
      ctx.stroke();
      // inner bright line
      ctx.strokeStyle=c.color;ctx.lineWidth=CELL*.2;ctx.shadowBlur=4;
      ctx.beginPath();
      ctx.moveTo(c.trail[0].x,c.trail[0].y);
      for(let i=1;i<c.trail.length;i++) ctx.lineTo(c.trail[i].x,c.trail[i].y);
      ctx.stroke();
      ctx.shadowBlur=0;ctx.lineCap='butt';
    }

    if(!c.alive){
      // derez particles
      c.derezParticles=c.derezParticles.filter(p=>{
        p.x+=p.vx*.06;p.y+=p.vy*.06;p.life-=.025;p.vx*=.96;p.vy*=.96;
        if(p.life<=0) return false;
        ctx.globalAlpha=p.life;
        ctx.fillStyle=c.color;
        ctx.shadowColor=c.color;ctx.shadowBlur=4;
        ctx.fillRect(p.x-p.r/2,p.y-p.r/2,p.r,p.r);
        ctx.shadowBlur=0;
        return true;
      });
      ctx.globalAlpha=1;
      continue;
    }

    // cycle head
    ctx.save();
    ctx.translate(c.x,c.y);
    ctx.rotate(Math.atan2(c.dy,c.dx));

    const sz=CELL*.9;
    ctx.shadowColor=c.color;ctx.shadowBlur=20;
    ctx.fillStyle=c.color+'33';
    ctx.beginPath();ctx.ellipse(0,0,sz*1.4,sz*.7,0,0,Math.PI*2);ctx.fill();

    // bike body
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.roundRect(-sz*.6,-sz*.35,sz*1.2,sz*.7,sz*.15);ctx.fill();
    ctx.strokeStyle=c.color;ctx.lineWidth=2;ctx.stroke();

    // headlight
    ctx.fillStyle=c.color;ctx.shadowBlur=12;
    ctx.beginPath();ctx.ellipse(sz*.5,0,sz*.2,sz*.15,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

// ── CONTROLS ──────────────────────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;e.preventDefault&&handleKey(e.code);},{passive:false});
window.addEventListener('keyup',e=>{delete keys[e.code];});

function handleKey(code){
  const p=cycles[0];
  if(!p||!p.alive||!gameRunning) return;
  if((code==='ArrowUp'||code==='KeyW')&&p.dy===0){p.dx=0;p.dy=-1;}
  if((code==='ArrowDown'||code==='KeyS')&&p.dy===0){p.dx=0;p.dy=1;}
  if((code==='ArrowLeft'||code==='KeyA')&&p.dx===0){p.dx=-1;p.dy=0;}
  if((code==='ArrowRight'||code==='KeyD')&&p.dx===0){p.dx=1;p.dy=0;}
}

// touch swipe
let tx0=0,ty0=0;
window.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0;
  const dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)<20&&Math.abs(dy)<20) return;
  const p=cycles[0];
  if(!p||!p.alive||!gameRunning) return;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0&&p.dx===0){p.dx=1;p.dy=0;}
    if(dx<0&&p.dx===0){p.dx=-1;p.dy=0;}
  } else {
    if(dy>0&&p.dy===0){p.dx=0;p.dy=1;}
    if(dy<0&&p.dy===0){p.dx=0;p.dy=-1;}
  }
},{passive:true});

// ── MAIN LOOP ──────────────────────────────────────────────────────────────
let last=0,accum=0;
const STEP=1000/20; // 20 moves/sec

function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(ts-last,100);last=ts;
  gridPulse+=dt*.001;

  drawGrid();
  drawCycles();

  if(gameRunning){
    accum+=dt;
    while(accum>=STEP){
      accum-=STEP;
      moveCycles();
    }
    checkCollisions();
    updateHUD();
  }
}

function moveCycles(){
  for(const c of cycles){
    if(!c.alive) continue;
    if(c.ai) aiTurn(c);
    c.x+=c.dx*CELL;c.y+=c.dy*CELL;
    c.trail.push({x:c.x,y:c.y});
  }
}

// ── COUNTDOWN + ROUND ──────────────────────────────────────────────────────
function countdown(n,then){
  const el=document.getElementById('countdown');
  const numEl=document.getElementById('cdnum');
  if(n<=0){el.classList.remove('show');then();return;}
  el.classList.add('show');
  numEl.textContent=n>1?n:'GO!';
  numEl.style.color=n>1?'#00f5ff':'#ffcc00';
  beep(n>1?440:880,.15,.3);
  // re-trigger animation
  numEl.style.animation='none';
  numEl.offsetHeight;
  numEl.style.animation='';
  setTimeout(()=>countdown(n-1,then),900);
}

function nextRound(){
  document.getElementById('result').classList.remove('show');
  round++;
  initCycles();
  updateHUD();
  accum=0;
  countdown(3,()=>{gameRunning=true;});
}

function startMatch(){
  scores=[0,0,0,0];round=1;
  document.getElementById('result').classList.remove('show');
  document.getElementById('overlay').classList.add('gone');
  initCycles();
  updateHUD();
  accum=0;
  countdown(3,()=>{gameRunning=true;ensureAudio();});
}

requestAnimationFrame(loop);
</script>
</body>
</html>
