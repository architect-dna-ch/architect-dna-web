<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02080f"/>
      <stop offset="60%" stop-color="#060e20"/>
      <stop offset="100%" stop-color="#080520"/>
    </linearGradient>
    <linearGradient id="cell-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00eeff"/>
      <stop offset="100%" stop-color="#7755ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="80" cy="60" r="1.2" fill="#00eeff" opacity="0.5"/>
  <circle cx="220" cy="110" r="1" fill="#7755ff" opacity="0.6"/>
  <circle cx="440" cy="40" r="1.5" fill="#00eeff" opacity="0.35"/>
  <circle cx="650" cy="90" r="1" fill="#00eeff" opacity="0.4"/>
  <circle cx="900" cy="55" r="1.2" fill="#7755ff" opacity="0.5"/>
  <circle cx="1100" cy="100" r="1" fill="#00eeff" opacity="0.45"/>
  <circle cx="150" cy="480" r="1.2" fill="#00eeff" opacity="0.3"/>
  <circle cx="1050" cy="520" r="1.5" fill="#7755ff" opacity="0.4"/>
  <circle cx="350" cy="580" r="1" fill="#00eeff" opacity="0.3"/>
  <circle cx="800" cy="570" r="1.2" fill="#00eeff" opacity="0.35"/>

  <!-- Hex logo mark -->
  <polygon points="60,315 75,287 105,287 120,315 105,343 75,343"
    fill="none" stroke="#00eeff" stroke-width="1.5" opacity="0.5" filter="url(#glow-sm)"/>
  <circle cx="90" cy="315" r="7" fill="#00eeff" opacity="0.6" filter="url(#glow-sm)"/>

  <!-- Studio eyebrow -->
  <text x="136" y="322" font-family="'Courier New',monospace" font-size="13" font-weight="700"
    letter-spacing="4" fill="#00eeff" opacity="0.5">INDEPENDENT GAME STUDIO · SWITZERLAND</text>

  <!-- VOID -->
  <text x="80" y="470" font-family="'Courier New',monospace" font-size="160" font-weight="900"
    letter-spacing="-6" fill="#f0f4ff" opacity="0.95">VOID</text>

  <!-- CELL — gradient -->
  <text x="80" y="590" font-family="'Courier New',monospace" font-size="160" font-weight="900"
    letter-spacing="-6" fill="url(#cell-grad)" filter="url(#glow)" opacity="0.95">CELL</text>

  <!-- Right side info -->
  <line x1="820" y1="220" x2="1140" y2="220" stroke="#00eeff" stroke-width="0.5" opacity="0.2"/>

  <text x="820" y="260" font-family="'Courier New',monospace" font-size="11" letter-spacing="3"
    fill="rgba(160,185,230,0.4)">FIRST TITLE</text>

  <text x="820" y="300" font-family="'Courier New',monospace" font-size="28" font-weight="900"
    letter-spacing="3" fill="#00eeff" filter="url(#glow-sm)">NEXUS BREACH</text>

  <text x="820" y="328" font-family="'Courier New',monospace" font-size="11" letter-spacing="2"
    fill="rgba(160,185,230,0.4)">NEON ARENA BRAWLER · LIVE NOW</text>

  <line x1="820" y1="350" x2="1140" y2="350" stroke="#00eeff" stroke-width="0.5" opacity="0.2"/>

  <text x="820" y="390" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14"
    fill="rgba(200,215,255,0.55)">Survive endless waves.</text>
  <text x="820" y="412" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14"
    fill="rgba(200,215,255,0.55)">Chain kills. Unlock abilities.</text>
  <text x="820" y="434" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14"
    fill="rgba(200,215,255,0.55)">No install. No account.</text>

  <!-- Play button -->
  <rect x="820" y="460" width="200" height="50" rx="12" fill="url(#cell-grad)" filter="url(#glow-sm)"/>
  <text x="920" y="492" font-family="'Courier New',monospace" font-size="13" font-weight="800"
    letter-spacing="3" text-anchor="middle" fill="#000">▶  PLAY FREE</text>

  <!-- Bottom -->
  <text x="820" y="600" font-family="'Courier New',monospace" font-size="11"
    fill="rgba(160,185,230,0.25)" letter-spacing="1">architect-dna.ch/games</text>
</svg>
