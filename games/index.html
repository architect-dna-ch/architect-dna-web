<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>VOID CELL — Game Store</title>
<meta name="description" content="VOID CELL Game Store — 7 browser games. No install required. Play free, install as PWA.">
<meta name="theme-color" content="#060810">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060810;--bg2:rgba(255,255,255,.04);--bg3:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.16);
  --text:#f0f0f8;--text2:rgba(240,240,248,.55);--text3:rgba(240,240,248,.28);
  --accent:#00d4ff;
  --font:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  --mono:'SF Mono','Fira Code','Courier New',monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{min-height:100dvh}

/* NAV */
nav{position:sticky;top:0;z-index:100;height:56px;background:rgba(6,8,16,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px}
.nav-logo{font-family:var(--mono);font-size:13px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:9px}
.nav-logo-box{width:28px;height:28px;border:1.5px solid rgba(0,212,255,.4);border-radius:6px;display:flex;align-items:center;justify-content:center}
.nav-logo-box svg{width:13px;height:13px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round}
.nav-count{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text3);text-transform:uppercase}
.nav-back{margin-left:auto;font-size:12px;font-weight:600;color:var(--text3);text-decoration:none;letter-spacing:.06em;transition:.15s}
.nav-back:hover{color:var(--text2)}
.nav-kbd{font-family:var(--mono);font-size:9px;background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;color:var(--text3);letter-spacing:.05em}

/* SHELF */
#shelf{position:sticky;top:56px;z-index:90;background:rgba(6,8,16,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 0}
.shelf-track{display:flex;gap:12px;padding:0 24px;overflow-x:auto;scrollbar-width:none;cursor:grab;user-select:none}
.shelf-track:active{cursor:grabbing}
.shelf-track::-webkit-scrollbar{display:none}
.shelf-card{flex-shrink:0;width:160px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg2);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative}
.shelf-card:hover{transform:translateY(-2px);border-color:var(--border2)}
.shelf-card.active{border-color:var(--accent);box-shadow:0 0 20px rgba(0,212,255,.18)}
.shelf-card.active .shelf-thumb-label{background:var(--accent);color:#000}
.shelf-thumb{width:100%;aspect-ratio:16/9;background:var(--bg3);position:relative;overflow:hidden}
.shelf-thumb canvas{position:absolute;inset:0;width:100%;height:100%}
.shelf-thumb-label{font-size:8px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-family:var(--mono);padding:2px 8px;border-radius:3px;background:var(--bg3);color:var(--text3);position:absolute;top:6px;left:6px;transition:.2s}
.shelf-name{font-size:11px;font-weight:800;padding:8px 10px 4px;letter-spacing:.04em;color:var(--text)}
.shelf-genre{font-size:9px;font-weight:600;padding:0 10px 8px;color:var(--text3);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase}

/* HERO */
#hero{display:grid;grid-template-columns:1fr 1fr;min-height:400px;max-height:60vh;position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
@media(max-width:700px){#hero{grid-template-columns:1fr;max-height:none}}
#hero-canvas{width:100%;height:100%;display:block;background:var(--bg)}
.hero-info{padding:40px 40px 40px 36px;display:flex;flex-direction:column;justify-content:center;gap:0;position:relative;z-index:1}
@media(max-width:700px){.hero-info{padding:28px 24px}}
.hero-genre{font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px;transition:.3s}
.hero-title{font-size:clamp(28px,4vw,52px);font-weight:900;letter-spacing:-.04em;line-height:.95;margin-bottom:14px;transition:.3s}
.hero-tagline{font-size:15px;color:var(--text2);line-height:1.55;margin-bottom:28px;transition:.3s;max-width:380px}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-play{display:inline-flex;align-items:center;gap:7px;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:800;border:none;cursor:pointer;transition:filter .15s,transform .1s;font-family:var(--font);letter-spacing:-.01em}
.btn-play:hover{filter:brightness(1.1)}
.btn-play:active{transform:scale(.97)}
.btn-install{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:700;background:transparent;border:1.5px solid var(--border2);color:var(--text2);cursor:pointer;transition:.15s;font-family:var(--font)}
.btn-install:hover{border-color:var(--text2);color:var(--text)}
.hero-nav-hint{margin-top:20px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px}

/* DETAIL */
#detail{padding:0}
.detail-inner{max-width:1200px;margin:0 auto}
.detail-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px}
.detail-tab{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:16px 20px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.detail-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.detail-tab:hover:not(.active){color:var(--text2)}
.detail-body{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:520px}
@media(max-width:900px){.detail-body{grid-template-columns:1fr}}
.detail-info{padding:36px 24px 36px 36px;display:flex;flex-direction:column;gap:20px;border-right:1px solid var(--border)}
@media(max-width:900px){.detail-info{border-right:none;border-bottom:1px solid var(--border);padding:28px 24px}}
.detail-desc{font-size:15px;color:var(--text2);line-height:1.75}
.detail-features{display:flex;flex-wrap:wrap;gap:8px}
.feat-chip{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-family:var(--mono);letter-spacing:.05em}
.detail-open{display:inline-flex;align-items:center;gap:7px;padding:12px 22px;border-radius:10px;font-size:13px;font-weight:800;text-decoration:none;transition:.15s;border:1.5px solid var(--border2);color:var(--text2);width:fit-content}
.detail-open:hover{border-color:var(--text2);color:var(--text)}
.detail-demo{position:relative;background:#000;display:flex;flex-direction:column}
.demo-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.demo-label{font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.demo-fullscreen{font-size:11px;font-weight:700;color:var(--text3);text-decoration:none;letter-spacing:.06em;transition:.15s;display:flex;align-items:center;gap:5px}
.demo-fullscreen:hover{color:var(--text)}
#demo-frame{width:100%;flex:1;border:none;background:#000;min-height:460px}
.demo-overlay{position:absolute;inset:0;background:rgba(6,8,16,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;cursor:pointer;transition:opacity .25s;z-index:10}
.demo-overlay.hidden{opacity:0;pointer-events:none}
.demo-overlay-icon{font-size:48px;opacity:.7}
.demo-overlay-text{font-size:14px;color:var(--text2);font-weight:600}
.demo-overlay-hint{font-size:11px;color:var(--text3)}
.demo-play-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:10px;font-size:14px;font-weight:800;border:none;cursor:pointer;transition:filter .15s;font-family:var(--font)}

/* STARS BG */
#stars{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.5}

/* TRANSITION */
.fade-swap{animation:fadeSwap .25s ease}
@keyframes fadeSwap{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<nav>
  <a class="nav-logo" href="/">
    <div class="nav-logo-box">
      <svg viewBox="0 0 14 14"><path d="M7 1L1 4v6l6 3 6-3V4L7 1z"/><path d="M7 1v12M1 4l6 3 6-3"/></svg>
    </div>
    VOID CELL
  </a>
  <span class="nav-count">7 Games Live</span>
  <span class="nav-kbd">⌘ ←→ navigate</span>
  <a class="nav-back" href="/">← architect-dna.ch</a>
</nav>

<section id="shelf">
  <div class="shelf-track" id="shelf-track"></div>
</section>

<section id="hero">
  <canvas id="hero-canvas"></canvas>
  <div class="hero-info">
    <div class="hero-genre" id="hero-genre"></div>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-tagline" id="hero-tagline"></p>
    <div class="hero-actions">
      <button class="btn-play" id="btn-play" onclick="openGame()">▶ Play Now</button>
      <button class="btn-install" id="btn-install" onclick="installGame()">⊕ Add to Home Screen</button>
    </div>
    <div class="hero-nav-hint">
      <span class="nav-kbd">← →</span>
      <span style="color:var(--text3);font-size:11px">or click a title above</span>
    </div>
  </div>
</section>

<section id="detail">
  <div class="detail-inner">
    <div class="detail-tabs">
      <button class="detail-tab active">Overview</button>
      <button class="detail-tab" onclick="scrollToDemo()">Play Inline</button>
    </div>
    <div class="detail-body">
      <div class="detail-info">
        <p class="detail-desc" id="detail-desc"></p>
        <div class="detail-features" id="detail-features"></div>
        <a class="detail-open" id="detail-open" target="_blank">Open Fullscreen ↗</a>
      </div>
      <div class="detail-demo" id="detail-demo">
        <div class="demo-header">
          <span class="demo-label">Live Demo</span>
          <a class="demo-fullscreen" id="demo-fullscreen-link" target="_blank">Fullscreen ↗</a>
        </div>
        <div style="position:relative;flex:1;display:flex;flex-direction:column">
          <iframe id="demo-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-orientation-lock allow-modals" allow="fullscreen;pointer-lock"></iframe>
          <div class="demo-overlay" id="demo-overlay" onclick="loadDemo()">
            <div class="demo-overlay-icon" id="demo-overlay-icon"></div>
            <button class="demo-play-btn" id="demo-play-btn">▶ Load Game</button>
            <div class="demo-overlay-hint">Runs in browser — no install needed</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
// ── GAME DATA ──────────────────────────────────────────────────────────────────
const GAMES = [
  {
    id:'nexus-breach',
    name:'NEXUS BREACH',
    tagline:'Orbital combat. Survive the infinite swarm.',
    genre:'Shooter · Score Attack',
    color:'#1aaeff',
    url:'/nexus-breach',
    emoji:'🚀',
    desc:'Your ship vs an infinite enemy swarm in orbital space. Dodge, aim, survive as long as you can. Each run is different — enemies scale with your score.',
    features:['Infinite waves','Score leaderboard','Keyboard + mouse','No install','~2MB total']
  },
  {
    id:'grid-fall',
    name:'GRID FALL',
    tagline:'Blocks fall. Think fast. Clear the grid.',
    genre:'Puzzle · Speed',
    color:'#ff2233',
    url:'/gridfal',
    emoji:'🟥',
    desc:'Classic falling block mechanics with brutal difficulty scaling. Clear lines before the grid fills. Pure spatial reasoning under relentless pressure.',
    features:['Speed scaling','High scores','Mobile-friendly','Touch controls','Instant start']
  },
  {
    id:'sector-zero',
    name:'SECTOR ZERO',
    tagline:'Deep space. Unknown threats. No two runs the same.',
    genre:'Roguelite · Action',
    color:'#7755ff',
    url:'/sector-zero',
    emoji:'⚡',
    desc:'Navigate procedurally generated sectors and eliminate everything that moves. Roguelite progression with an upgrade system means each run teaches you something new.',
    features:['Roguelite runs','Procedural maps','Upgrade system','Permadeath','No install']
  },
  {
    id:'kart',
    name:'KART',
    tagline:'Drift lines. Real physics. Neon track.',
    genre:'Racing · Physics',
    color:'#ffaa00',
    url:'/kart',
    emoji:'🏎',
    desc:'Genuine friction physics with drift and momentum — not fake arcade handling. Light cycle aesthetic. Learn the track, master the corners, beat your own time.',
    features:['Real physics engine','Drift mechanics','Time attack','Track mastery','Browser native']
  },
  {
    id:'bloom',
    name:'BLOOM',
    tagline:'Plant, grow, share with your neighbors.',
    genre:'Garden · Social',
    color:'#00e87a',
    url:'/bloom',
    emoji:'🌸',
    desc:'A calm, social garden game where your flowers grow in real time. Plant seeds, harvest crops, cook recipes, and share produce with neighbors via gift codes.',
    features:['Real-time growth','Gift codes','Recipe system','Social','iOS coming soon']
  },
  {
    id:'sprint',
    name:'SPRINT',
    tagline:'Click 1→25. Beat the clock. Challenge your WG.',
    genre:'Reflex · Leaderboard',
    color:'#00d4ff',
    url:'/sprint',
    emoji:'⏱',
    desc:'Click numbers 1 through 25 in order as fast as you can. Every grid is unique per seed. Share your leaderboard via URL — scores accumulate as the link passes around.',
    features:['Seeded grids','URL leaderboard','Anonymous scores','Share scores','WG-friendly']
  },
  {
    id:'fly',
    name:'CITY FROM ABOVE',
    tagline:'3D bird flight over NYC and Sydney.',
    genre:'Experience · 3D',
    color:'#3b82f6',
    url:'/fly',
    emoji:'🌆',
    desc:'Real-data 3D flight experience over New York and Sydney. 44+ landmark buildings rendered with bloom and glow. Autonomous drone, manual camera, cinematic follow-cam.',
    features:['Real building data','Bloom rendering','Drone cam mode','NYC + Sydney','WebGL · Three.js']
  }
];

let activeIdx = 0;
let demoLoaded = false;
let heroAnimFrame = null;

// ── STARS BACKGROUND ──────────────────────────────────────────────────────────
const starsC = document.getElementById('stars');
const starsCtx = starsC.getContext('2d');
const starsList = Array.from({length:160}, () => ({
  x:Math.random(), y:Math.random(),
  s:Math.random()*1.2+0.2, b:Math.random(),
  sp:Math.random()*0.0003+0.0001
}));
function resizeStars(){ starsC.width=window.innerWidth; starsC.height=window.innerHeight; }
resizeStars(); window.addEventListener('resize', resizeStars);
function drawStars(){
  requestAnimationFrame(drawStars);
  starsCtx.clearRect(0,0,starsC.width,starsC.height);
  starsList.forEach(s => {
    s.b+=s.sp;
    starsCtx.globalAlpha=Math.max(0,.05+Math.sin(s.b)*.06);
    starsCtx.fillStyle='#fff';
    starsCtx.beginPath(); starsCtx.arc(s.x*starsC.width,s.y*starsC.height,s.s,0,Math.PI*2); starsCtx.fill();
  });
  starsCtx.globalAlpha=1;
}
drawStars();

// ── SHELF ─────────────────────────────────────────────────────────────────────
const shelfTrack = document.getElementById('shelf-track');
GAMES.forEach((g,i) => {
  const card = document.createElement('div');
  card.className = 'shelf-card' + (i===0?' active':'');
  card.innerHTML = `
    <div class="shelf-thumb" style="background:linear-gradient(135deg,#0a0e18,${g.color}18)">
      <canvas id="thumb-${g.id}" style="opacity:.85"></canvas>
      <span class="shelf-thumb-label" style="${i===0?`background:${g.color};color:#000`:''}"></span>
    </div>
    <div class="shelf-name">${g.name}</div>
    <div class="shelf-genre">${g.genre.split('·')[0].trim()}</div>
  `;
  card.onclick = () => selectGame(i);
  shelfTrack.appendChild(card);
});

// Shelf drag
let shelfDrag=false, shelfStartX=0, shelfScrollStart=0;
shelfTrack.addEventListener('mousedown',e=>{shelfDrag=true;shelfStartX=e.pageX;shelfScrollStart=shelfTrack.scrollLeft});
window.addEventListener('mousemove',e=>{if(!shelfDrag)return;shelfTrack.scrollLeft=shelfScrollStart-(e.pageX-shelfStartX)});
window.addEventListener('mouseup',()=>shelfDrag=false);

// ── HERO CANVAS ANIMATIONS ────────────────────────────────────────────────────
const heroC = document.getElementById('hero-canvas');
const heroCtx = heroC.getContext('2d');
function resizeHero(){
  heroC.width=heroC.offsetWidth*(devicePixelRatio||1);
  heroC.height=heroC.offsetHeight*(devicePixelRatio||1);
}
window.addEventListener('resize',resizeHero);

const heroDrawers = {
  'nexus-breach': makeNexusDraw(),
  'grid-fall':    makeGridDraw(),
  'sector-zero':  makeSectorDraw(),
  'kart':         makeKartDraw(),
  'bloom':        makeBloomDraw(),
  'sprint':       makeSprintDraw(),
  'fly':          makeFlyDraw()
};

function makeNexusDraw(){
  const enemies=Array.from({length:22},(_,i)=>({angle:(i/22)*Math.PI*2,r:60+Math.random()*160,speed:(Math.random()-.5)*.022,size:3+Math.random()*7,color:Math.random()>.5?'#1aaeff':'#7755ff'}));
  const bullets=Array.from({length:10},(_,i)=>({angle:(i/10)*Math.PI*2,r:0,speed:4}));
  let f=0;
  return function(ctx,w,h){
    f++;
    ctx.clearRect(0,0,w,h);
    const cx=w/2,cy=h/2;
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,120);
    gr.addColorStop(0,'rgba(26,174,255,.12)');gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr;ctx.fillRect(0,0,w,h);
    ctx.save();ctx.translate(cx,cy);
    ctx.strokeStyle='#1aaeff';ctx.lineWidth=1.5;ctx.globalAlpha=.5;
    ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;ctx.fillStyle='#1aaeff';
    ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(13,11);ctx.lineTo(0,5);ctx.lineTo(-13,11);ctx.closePath();ctx.fill();
    ctx.restore();
    enemies.forEach(e=>{
      e.angle+=e.speed;
      const x=cx+Math.cos(e.angle)*e.r,y=cy+Math.sin(e.angle)*e.r;
      ctx.fillStyle=e.color;ctx.globalAlpha=.7;
      ctx.beginPath();ctx.arc(x,y,e.size,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=.18;ctx.beginPath();ctx.arc(x,y,e.size+7,0,Math.PI*2);ctx.fill();
    });
    bullets.forEach(b=>{
      b.r+=b.speed; if(b.r>Math.max(w,h)/1.5)b.r=0;
      const a=b.angle+f*.014,x=cx+Math.cos(a)*b.r,y=cy+Math.sin(a)*b.r;
      ctx.globalAlpha=Math.max(0,1-b.r/320);ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
  };
}
function makeGridDraw(){
  const COLS=9,ROWS=14;
  const grid=Array.from({length:ROWS},()=>Array.from({length:COLS},()=>Math.random()>.55?1:0));
  const COLORS=['#ff2233','#ff5544','#ff8833'];
  let f=0,dropY=0;
  return function(ctx,w,h){
    f++;ctx.clearRect(0,0,w,h);
    const SZ=Math.min(w/COLS,h/ROWS)*.7,ox=(w-COLS*SZ)/2,oy=(h-ROWS*SZ)/2;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      if(grid[r][c]){ctx.fillStyle=COLORS[(r+c)%3];ctx.globalAlpha=.2+(r/ROWS)*.55;ctx.fillRect(ox+c*SZ+2,oy+r*SZ+2,SZ-4,SZ-4);}
      else{ctx.strokeStyle='rgba(255,34,51,.06)';ctx.lineWidth=1;ctx.strokeRect(ox+c*SZ+1,oy+r*SZ+1,SZ-2,SZ-2);}
    }
    if(f%3===0)dropY=(dropY+1)%ROWS;
    [[dropY,3],[dropY,4],[dropY+1,3],[dropY+1,4]].forEach(([r,c])=>{
      if(r<ROWS&&c<COLS){ctx.fillStyle='#ff2233';ctx.globalAlpha=.9;ctx.fillRect(ox+c*SZ+2,oy+r*SZ+2,SZ-4,SZ-4);}
    });
    ctx.globalAlpha=1;
  };
}
function makeSectorDraw(){
  const ships=Array.from({length:14},()=>({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.003,vy:(Math.random()-.5)*.003}));
  let f=0;
  return function(ctx,w,h){
    f++;ctx.clearRect(0,0,w,h);
    ctx.fillStyle='rgba(119,85,255,.06)';
    for(let i=0;i<3;i++){const r=80+i*60;ctx.beginPath();ctx.arc(w/2,h/2,r,0,Math.PI*2);ctx.strokeStyle=`rgba(119,85,255,${.04+i*.02})`;ctx.lineWidth=1;ctx.stroke();}
    ships.forEach(s=>{
      s.x+=s.vx;s.y+=s.vy;
      if(s.x<0||s.x>1)s.vx*=-1;if(s.y<0||s.y>1)s.vy*=-1;
      const x=s.x*w,y=s.y*h;
      ctx.fillStyle='#7755ff';ctx.globalAlpha=.6;
      ctx.save();ctx.translate(x,y);ctx.rotate(Math.atan2(s.vy,s.vx)+Math.PI/2);
      ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(5,6);ctx.lineTo(0,2);ctx.lineTo(-5,6);ctx.closePath();ctx.fill();
      ctx.restore();
    });
    ctx.globalAlpha=1;
  };
}
function makeKartDraw(){
  const pts=[];for(let i=0;i<60;i++){const a=(i/60)*Math.PI*2;pts.push({x:.5+.38*Math.cos(a)+.12*Math.cos(a*2),y:.5+.3*Math.sin(a)+.08*Math.sin(a*3)});}
  let t=0;
  return function(ctx,w,h){
    t+=.006;ctx.clearRect(0,0,w,h);
    ctx.strokeStyle='rgba(255,170,0,.22)';ctx.lineWidth=18;ctx.beginPath();
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x*w,p.y*h):ctx.lineTo(p.x*w,p.y*h));
    ctx.closePath();ctx.stroke();
    ctx.strokeStyle='rgba(255,170,0,.55)';ctx.lineWidth=2;ctx.beginPath();
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x*w,p.y*h):ctx.lineTo(p.x*w,p.y*h));
    ctx.closePath();ctx.stroke();
    const ti=t%(1),idx=Math.floor(ti*pts.length),p=pts[idx],pn=pts[(idx+1)%pts.length];
    const kx=p.x*w,ky=p.y*h,angle=Math.atan2((pn.y-p.y)*h,(pn.x-p.x)*w);
    ctx.save();ctx.translate(kx,ky);ctx.rotate(angle);
    ctx.fillStyle='#ffaa00';ctx.globalAlpha=.95;
    ctx.beginPath();ctx.roundRect(-10,-6,20,12,3);ctx.fill();
    ctx.fillStyle='rgba(255,170,0,.3)';ctx.beginPath();ctx.arc(-8,0,16,0,Math.PI*2);ctx.fill();
    ctx.restore();ctx.globalAlpha=1;
  };
}
function makeBloomDraw(){
  const flowers=Array.from({length:12},()=>({x:Math.random(),y:Math.random(),r:8+Math.random()*20,bloom:Math.random(),speed:.005+Math.random()*.008,hue:100+Math.random()*60}));
  return function(ctx,w,h){
    ctx.clearRect(0,0,w,h);
    flowers.forEach(fl=>{
      fl.bloom=(fl.bloom+fl.speed)%1;
      const br=fl.r*fl.bloom,x=fl.x*w,y=fl.y*h;
      for(let p=0;p<6;p++){
        const a=(p/6)*Math.PI*2,px=x+Math.cos(a)*br,py=y+Math.sin(a)*br;
        const g=ctx.createRadialGradient(px,py,0,px,py,br*.7);
        g.addColorStop(0,`hsla(${fl.hue},80%,70%,.6)`);g.addColorStop(1,'transparent');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,br*.7,0,Math.PI*2);ctx.fill();
      }
      ctx.fillStyle=`hsla(${fl.hue+20},60%,50%,.8)`;ctx.globalAlpha=fl.bloom;
      ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    });
  };
}
function makeSprintDraw(){
  const nums=Array.from({length:25},(_,i)=>({n:i+1,x:Math.random(),y:Math.random(),hit:Math.random()>.6,t:Math.random()*Math.PI*2}));
  let f=0,nextN=1;
  return function(ctx,w,h){
    f++;if(f%90===0){nextN=(nextN%25)+1;}
    ctx.clearRect(0,0,w,h);
    const cols=5,rows=5,cw=w/cols,ch=h/rows;
    nums.forEach((n,i)=>{
      const col=i%cols,row=Math.floor(i/cols);
      const cx2=col*cw+cw/2,cy2=row*ch+ch/2;
      const isNext=n.n===nextN;
      ctx.fillStyle=n.hit?'rgba(255,255,255,.04)':isNext?'rgba(0,212,255,.15)':'rgba(255,255,255,.07)';
      ctx.strokeStyle=isNext?'rgba(0,212,255,.8)':'rgba(255,255,255,.12)';
      ctx.lineWidth=isNext?1.5:1;
      const s=Math.min(cw,ch)*.72;
      ctx.beginPath();ctx.roundRect(cx2-s/2,cy2-s/2,s,s,6);ctx.fill();ctx.stroke();
      if(!n.hit){
        ctx.fillStyle=isNext?'#00d4ff':'rgba(240,240,248,.55)';
        ctx.font=`${isNext?'800':'600'} ${Math.min(s*.38,18)}px system-ui`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(n.n,cx2,cy2);
      }
    });
  };
}
function makeFlyDraw(){
  const buildings=Array.from({length:18},()=>({x:Math.random(),h:.1+Math.random()*.7,w:.03+Math.random()*.06,lit:Math.random()>.4}));
  let f=0;
  return function(ctx,w,h){
    f++;ctx.clearRect(0,0,w,h);
    const ground=h*.65;
    const gr=ctx.createLinearGradient(0,0,0,h);
    gr.addColorStop(0,'#060c1a');gr.addColorStop(1,'#0a1830');
    ctx.fillStyle=gr;ctx.fillRect(0,0,w,h);
    buildings.forEach((b,i)=>{
      const bx=b.x*w,bh=b.h*ground,bw=b.w*w;
      ctx.fillStyle=`rgba(30,60,120,${.4+Math.sin(f*.02+i)*.1})`;
      ctx.fillRect(bx-bw/2,ground-bh,bw,bh);
      if(b.lit){
        for(let wr=0;wr<Math.floor(bh/12);wr++)for(let wc=0;wc<Math.floor(bw/8);wc++){
          if(Math.random()>.7)continue;
          ctx.fillStyle=`rgba(255,220,100,${.2+Math.random()*.3})`;
          ctx.fillRect(bx-bw/2+wc*8+1,ground-bh+wr*12+2,4,5);
        }
      }
    });
    const drone={x:w*.35+Math.sin(f*.018)*w*.15,y:ground*.4+Math.sin(f*.027)*ground*.15};
    ctx.fillStyle='rgba(59,130,246,.9)';ctx.globalAlpha=.8;
    ctx.save();ctx.translate(drone.x,drone.y);
    ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(6,4);ctx.lineTo(-6,4);ctx.closePath();ctx.fill();
    ctx.restore();
    const trail=[];for(let i=1;i<=20;i++){trail.push({x:drone.x-Math.sin(f*.018-i*.04)*w*.15,y:drone.y-Math.sin(f*.027-i*.04)*ground*.15,a:1-i/20});}
    trail.forEach((p,i)=>{ctx.globalAlpha=p.a*.3;ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;
  };
}

// Thumb canvases (small previews in shelf)
function startThumbAnims(){
  GAMES.forEach(g=>{
    const c=document.getElementById(`thumb-${g.id}`);
    if(!c)return;
    const ctx=c.getContext('2d');
    const draw=heroDrawers[g.id];
    if(!draw)return;
    function frame(){
      const w=c.offsetWidth*(devicePixelRatio||1),h=c.offsetHeight*(devicePixelRatio||1);
      if(c.width!==w||c.height!==h){c.width=w;c.height=h;}
      draw(ctx,c.width,c.height);
      requestAnimationFrame(frame);
    }
    frame();
  });
}

// ── SELECT GAME ───────────────────────────────────────────────────────────────
function selectGame(idx){
  activeIdx=idx;
  demoLoaded=false;
  const g=GAMES[idx];

  // Update shelf
  document.querySelectorAll('.shelf-card').forEach((c,i)=>{
    c.classList.toggle('active',i===idx);
    const lbl=c.querySelector('.shelf-thumb-label');
    if(i===idx){lbl.style.background=g.color;lbl.style.color='#000';}
    else{lbl.style.background='';lbl.style.color='';}
  });

  // Scroll shelf card into view
  const shelfCards=[...document.querySelectorAll('.shelf-card')];
  if(shelfCards[idx]) shelfCards[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});

  // Hero info
  const heroInfo=document.querySelector('.hero-info');
  heroInfo.classList.remove('fade-swap');
  void heroInfo.offsetWidth;
  heroInfo.classList.add('fade-swap');

  document.getElementById('hero-genre').textContent=g.genre;
  document.getElementById('hero-genre').style.color=g.color;
  document.getElementById('hero-title').textContent=g.name;
  document.getElementById('hero-title').style.color=g.color;
  document.getElementById('hero-tagline').textContent=g.tagline;

  const btnPlay=document.getElementById('btn-play');
  btnPlay.style.background=g.color;
  btnPlay.style.color=['#00e87a','#ffaa00','#00d4ff','#ff2233'].includes(g.color)?'#000':'#fff';

  // Detail
  document.getElementById('detail-desc').textContent=g.desc;
  document.getElementById('detail-features').innerHTML=g.features.map(f=>`<span class="feat-chip">${f}</span>`).join('');
  document.getElementById('detail-open').href=g.url;
  document.getElementById('demo-fullscreen-link').href=g.url;
  document.getElementById('demo-overlay-icon').textContent=g.emoji;
  document.getElementById('demo-play-btn').style.background=g.color;
  document.getElementById('demo-play-btn').style.color='#000';

  // Reset demo
  const frame=document.getElementById('demo-frame');
  frame.src='about:blank';
  document.getElementById('demo-overlay').classList.remove('hidden');
}

function openGame(){
  window.open(GAMES[activeIdx].url, '_blank', 'noopener');
}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});
function installGame(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}
  else{window.open(GAMES[activeIdx].url,'_blank','noopener');}
}

function loadDemo(){
  demoLoaded=true;
  document.getElementById('demo-overlay').classList.add('hidden');
  document.getElementById('demo-frame').src=GAMES[activeIdx].url;
}

function scrollToDemo(){
  document.getElementById('detail-demo').scrollIntoView({behavior:'smooth'});
  if(!demoLoaded) setTimeout(loadDemo, 400);
}

// ── HERO CANVAS LOOP ──────────────────────────────────────────────────────────
function heroLoop(){
  if(heroAnimFrame) cancelAnimationFrame(heroAnimFrame);
  const g=GAMES[activeIdx];
  const draw=heroDrawers[g.id];
  if(!draw){heroAnimFrame=null;return;}
  function frame(){
    const w=heroC.offsetWidth*(devicePixelRatio||1),h=heroC.offsetHeight*(devicePixelRatio||1);
    if(heroC.width!==w||heroC.height!==h){heroC.width=w;heroC.height=h;}
    draw(heroCtx,heroC.width,heroC.height);
    heroAnimFrame=requestAnimationFrame(frame);
  }
  frame();
}

// ── KEYBOARD NAV ──────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||(e.metaKey&&e.key==='ArrowRight')){e.preventDefault();selectGame(Math.min(activeIdx+1,GAMES.length-1));}
  if(e.key==='ArrowLeft'||(e.metaKey&&e.key==='ArrowLeft')){e.preventDefault();selectGame(Math.max(activeIdx-1,0));}
});

// ── INIT ──────────────────────────────────────────────────────────────────────
selectGame(0);
heroLoop();
// Restart hero loop when game changes (observe activeIdx changes via selectGame call)
const _origSelect=selectGame;
window.selectGame=function(idx){_origSelect(idx);heroLoop();};
window.addEventListener('load',()=>{startThumbAnims();window.selectGame(0);});
window.addEventListener('resize',()=>{resizeHero();});
</script>
