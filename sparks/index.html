<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connection Sparks — Jeden Tag eine kleine Verbindung</title>
<meta name="theme-color" content="#0a0a14">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a14;--bg2:#12121f;--bg3:#1a1a2e;
  --glass:rgba(255,255,255,.06);--glass2:rgba(255,255,255,.1);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#f0f0ff;--text2:rgba(240,240,255,.65);--text3:rgba(240,240,255,.35);
  --purple:#8b5cf6;--pink:#ec4899;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --blue:#60a5fa;
  --grad:linear-gradient(135deg,#8b5cf6,#ec4899);
  --font:system-ui,-apple-system,sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
  --r:14px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* BG orbs */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:400px;height:400px;background:rgba(139,92,246,.15);top:-100px;right:-100px}
.orb2{width:300px;height:300px;background:rgba(236,72,153,.1);bottom:-50px;left:-50px}

header{position:relative;z-index:10;padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:900;letter-spacing:-.03em;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.streak-badge{display:flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--border2);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700}
.streak-num{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.container{position:relative;z-index:10;max-width:520px;margin:0 auto;padding:0 20px 80px}

/* Category filter */
.filters{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.filter{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--glass);color:var(--text2);transition:.15s;white-space:nowrap;font-family:var(--font)}
.filter:hover{color:var(--text)}
.filter.active[data-c="all"]{background:var(--grad);border-color:transparent;color:#fff}
.filter.active[data-c="sozial"]{background:rgba(96,165,250,.2);border-color:var(--blue);color:var(--blue)}
.filter.active[data-c="koerper"]{background:rgba(34,197,94,.2);border-color:var(--green);color:var(--green)}
.filter.active[data-c="kopf"]{background:rgba(139,92,246,.2);border-color:var(--purple);color:var(--purple)}
.filter.active[data-c="kreativ"]{background:rgba(245,158,11,.2);border-color:var(--amber);color:var(--amber)}

/* Challenge card */
.card-wrap{perspective:1000px;margin-bottom:20px}
.challenge-card{background:var(--glass);border:1px solid var(--border2);border-radius:20px;padding:28px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:relative;overflow:hidden;transition:transform .3s}
.challenge-card::before{content:'';position:absolute;inset:0;background:var(--grad);opacity:.04;pointer-events:none}
.card-cat{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-family:var(--mono);margin-bottom:14px}
.card-cat[data-c="sozial"]{color:var(--blue)}
.card-cat[data-c="koerper"]{color:var(--green)}
.card-cat[data-c="kopf"]{color:var(--purple)}
.card-cat[data-c="kreativ"]{color:var(--amber)}
.card-diff{display:inline-flex;align-items:center;gap:4px;background:var(--glass2);border:1px solid var(--border);padding:3px 10px;border-radius:10px;font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:16px;float:right}
.card-emoji{font-size:48px;margin-bottom:16px;display:block;line-height:1}
.card-title{font-size:22px;font-weight:900;letter-spacing:-.02em;margin-bottom:10px;line-height:1.2}
.card-desc{font-size:14px;color:var(--text2);line-height:1.75;margin-bottom:24px}
.card-why{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:24px}
.card-why strong{color:var(--purple)}

.card-actions{display:flex;gap:10px}
.btn-done{flex:2;padding:14px;border-radius:12px;background:var(--grad);color:#fff;border:none;font-size:15px;font-weight:800;cursor:pointer;font-family:var(--font);transition:filter .15s}
.btn-done:hover{filter:brightness(1.1)}
.btn-done.done-state{background:rgba(34,197,94,.2);border:1px solid var(--green);color:var(--green)}
.btn-skip{flex:1;padding:14px;border-radius:12px;background:var(--glass);border:1px solid var(--border2);color:var(--text3);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.15s}
.btn-skip:hover{color:var(--text)}

/* Confetti */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:999;animation:confettiFall 1.2s ease-in forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* Next challenges preview */
.upcoming{margin-top:8px}
.upcoming-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:12px}
.mini-cards{display:flex;flex-direction:column;gap:8px}
.mini-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s}
.mini-card:hover{border-color:var(--border2);background:var(--glass2)}
.mini-card.completed{opacity:.5}
.mini-emoji{font-size:22px;flex-shrink:0}
.mini-body{flex:1}
.mini-title{font-size:13px;font-weight:700}
.mini-cat{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.mini-check{font-size:16px}

/* Share */
.share-section{margin-top:24px;background:var(--glass);border:1px solid var(--border2);border-radius:14px;padding:18px;text-align:center}
.share-label{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:10px;letter-spacing:.08em}
.share-btn{padding:9px 22px;border-radius:9px;background:var(--grad);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:380px){.card-title{font-size:18px}.card-emoji{font-size:36px}}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<header>
  <div class="logo">✦ Connection Sparks</div>
  <div class="streak-badge">🔥 <span class="streak-num" id="streak-num">0</span> Tage</div>
</header>

<div class="container">
  <div class="filters">
    <button class="filter active" data-c="all" onclick="setFilter('all')">Alle</button>
    <button class="filter" data-c="sozial" onclick="setFilter('sozial')">💙 Sozial</button>
    <button class="filter" data-c="koerper" onclick="setFilter('koerper')">💚 Körper</button>
    <button class="filter" data-c="kopf" onclick="setFilter('kopf')">💜 Kopf</button>
    <button class="filter" data-c="kreativ" onclick="setFilter('kreativ')">🧡 Kreativ</button>
  </div>

  <div class="card-wrap">
    <div class="challenge-card" id="main-card"></div>
  </div>

  <div class="upcoming">
    <div class="upcoming-label">Weitere Challenges</div>
    <div class="mini-cards" id="mini-list"></div>
  </div>

  <div class="share-section">
    <div class="share-label">Challenge teilen</div>
    <button class="share-btn" onclick="shareChallenge()">📤 Teilen</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CHALLENGES = [
  // SOZIAL
  { id:1, cat:'sozial', emoji:'👋', title:'Klopf einfach an', desc:'Klopf bei einem WG-Mitbewohner an und frag, ob er kurz Zeit hat. Kein Plan nötig — einfach da sein.', why:'<strong>Warum:</strong> Die meisten sozialen Momente entstehen spontan. Der erste Schritt kostet mehr als das Gespräch.', diff:'Mittel' },
  { id:2, cat:'sozial', emoji:'🍳', title:'Koch für alle', desc:'Mach heute Abend etwas zu essen und frag deine WG-Mitbewohner, ob sie mitmachen. Nichts Besonderes — Pasta reicht.', why:'<strong>Warum:</strong> Essen zusammen ist der einfachste Weg, echte Zeit zu verbringen ohne Agenda.', diff:'Einfach' },
  { id:3, cat:'sozial', emoji:'🎵', title:'Song teilen', desc:'Schick jemandem einen Song mit einer kurzen Nachricht: "Der musste ich heute denken." Das war\'s.', why:'<strong>Warum:</strong> Musik öffnet Gespräche über Geschmack, Erinnerungen, Identität — mehr als Small Talk.', diff:'Einfach' },
  { id:4, cat:'sozial', emoji:'☕', title:'Kaffee anbieten', desc:'Frag morgen früh deinen WG-Mitbewohner einfach: "Kaffee?" Das öffnet Türen ohne Erwartungen.', why:'<strong>Warum:</strong> Kleine Gesten signalisieren Offenheit, ohne jemanden unter Druck zu setzen.', diff:'Einfach' },
  { id:5, cat:'sozial', emoji:'🎬', title:'Film vorschlagen', desc:'Schick der WG eine Nachricht: "Film heute Abend? Ich such was aus." Wer will, kommt.', why:'<strong>Warum:</strong> Gemeinsam etwas erleben ohne reden zu müssen ist unterschätzter Verbindungs-Turbo.', diff:'Mittel' },
  { id:6, cat:'sozial', emoji:'📝', title:'Zettel hinterlassen', desc:'Hinterlass einen handgeschriebenen Zettel im WG-Zimmer oder Küche — eine nette Kleinigkeit, ein Witz, ein Kompliment.', why:'<strong>Warum:</strong> Physische Gesten bleiben. Ein Zettel wird öfter gelesen als jede Nachricht.', diff:'Einfach' },
  { id:7, cat:'sozial', emoji:'🚶', title:'Spaziergang einladen', desc:'Frag jemanden ob er mit dir raus will — 20 Minuten reichen. Spaziergang ist ein date ohne date zu sein.', why:'<strong>Warum:</strong> Bewegung löst Gespräche, die im Sitzen nie entstehen würden.', diff:'Mittel' },
  { id:8, cat:'sozial', emoji:'🎮', title:'Multiplayer vorschlagen', desc:'Such online ein einfaches kostenloses Spiel und lad eine Person ein. Keine Vorkenntnisse nötig.', why:'<strong>Warum:</strong> Zusammen gewinnen und verlieren schafft schneller Nähe als meiste Gespräche.', diff:'Mittel' },
  { id:9, cat:'sozial', emoji:'🤝', title:'Alte Verbindung reaktivieren', desc:'Denk an jemanden, mit dem du länger nicht gesprochen hast. Schreib eine kurze, ehrliche Nachricht ohne Erwartung.', why:'<strong>Warum:</strong> Verbindungen schlafen ein, sterben aber selten. Ein "Hey, dachte an dich" reicht.', diff:'Fordern' },
  { id:10, cat:'sozial', emoji:'🌆', title:'Raus und Menschen beobachten', desc:'Geh ins Café oder in die Stadt. Sitz 30 Minuten ohne Handy. Sei einfach da.', why:'<strong>Warum:</strong> Das Gehirn braucht ungefilterte soziale Signale — auch passives Dabeisein zählt.', diff:'Einfach' },
  // KÖRPER
  { id:11, cat:'koerper', emoji:'🌅', title:'Frühauf-Morgen', desc:'Steh heute 30 Minuten früher auf. Geh kurz vor die Tür und atme bewusst. Kein Handy in den ersten 15 Minuten.', why:'<strong>Warum:</strong> Die erste Stunde prägt den ganzen Tag. Wer sie selbst gestaltet, gewinnt Struktur zurück.', diff:'Mittel' },
  { id:12, cat:'koerper', emoji:'🏃', title:'10 Minuten Bewegung', desc:'Geh raus und beweg dich 10 Minuten — schnell gehen, laufen, was du willst. Kein Ziel. Nur bewegen.', why:'<strong>Warum:</strong> Körper und Stimmung sind direkt verknüpft. 10 Minuten verschieben den Tag.', diff:'Einfach' },
  { id:13, cat:'koerper', emoji:'💧', title:'Hydration-Check', desc:'Trink heute 2 Liter Wasser. Stell dir eine Erinnerung. Klingt banal, ist aber direkt mit Energie und Stimmung verbunden.', why:'<strong>Warum:</strong> Leichte Dehydration verschlechtert Konzentration und Laune, ohne dass man es merkt.', diff:'Einfach' },
  { id:14, cat:'koerper', emoji:'🧘', title:'5 Minuten Stille', desc:'Sitz 5 Minuten ohne Input. Kein Handy, kein Podcast, kein Musik. Einfach sitzen und existieren.', why:'<strong>Warum:</strong> Das Nervensystem braucht Pausen ohne Reize, um sich zu regulieren.', diff:'Fordern' },
  { id:15, cat:'koerper', emoji:'🚴', title:'Neue Route', desc:'Nimm heute einen anderen Weg als üblich — zum Laden, zur Haltestelle, überall. Explore deinen Radius.', why:'<strong>Warum:</strong> Neue Umgebungen aktivieren das Gehirn und brechen Autopilot-Muster.', diff:'Einfach' },
  { id:16, cat:'koerper', emoji:'🌿', title:'30 Minuten draußen', desc:'Geh 30 Minuten nach draußen ohne Plan. Park, Wald, Straße — egal. Keine Destination nötig.', why:'<strong>Warum:</strong> Zeit in der Natur senkt Cortisol nachweislich stärker als fast jede andere Aktivität.', diff:'Einfach' },
  // KOPF
  { id:17, cat:'kopf', emoji:'📓', title:'Drei Wahrheiten aufschreiben', desc:'Schreib 3 Dinge auf, die heute wahr sind — keine Bewertung, keine Lösung. Nur: was ist gerade so.', why:'<strong>Warum:</strong> Gedanken zu verschriften gibt ihnen Grenzen. Was Form hat, fühlt sich kontrollierbarer an.', diff:'Einfach' },
  { id:18, cat:'kopf', emoji:'🔮', title:'Brief an dich selbst', desc:'Schreib einen kurzen Brief an dein Selbst in 6 Monaten. Was soll er wissen? Was wünschst du ihm?', why:'<strong>Warum:</strong> Zukunftsperspektive aktiviert Handlungsenergie, die Gegenwartssorgen blockieren.', diff:'Mittel' },
  { id:19, cat:'kopf', emoji:'🎯', title:'Eine Sache festlegen', desc:'Bestimm heute: Was ist die eine Sache, die diese Woche zählt? Schreib sie auf. Nur eine.', why:'<strong>Warum:</strong> Fokus entsteht nicht von allein. Eine explizite Priorität schützt vor Drift.', diff:'Mittel' },
  { id:20, cat:'kopf', emoji:'💭', title:'Dankbarkeits-Scan', desc:'Denk an 3 kleine Dinge, für die du heute dankbar sein könntest. Nichts Großes. Klein ist genug.', why:'<strong>Warum:</strong> Das Gehirn ist durch Evolution auf Problemfokus ausgerichtet. Aktive Dankbarkeit trainiert den Ausgleich.', diff:'Einfach' },
  { id:21, cat:'kopf', emoji:'📚', title:'30 Minuten lesen', desc:'Lies 30 Minuten in einem echten Buch. Kein Artikel, kein Feed. Etwas, das dich schon lange interessiert.', why:'<strong>Warum:</strong> Tiefes Lesen ist eine der wenigen Aktivitäten, die gleichzeitig entspannen und schärfen.', diff:'Einfach' },
  { id:22, cat:'kopf', emoji:'🔑', title:'Eine Angst benennen', desc:'Schreib in einem Satz auf, was dich gerade wirklich aufhält. Nur benennen — keine Lösung nötig.', why:'<strong>Warum:</strong> Unbenannte Angst verbraucht konstant mentale Energie. Benennen macht sie kleiner.', diff:'Fordern' },
  // KREATIV
  { id:23, cat:'kreativ', emoji:'✏️', title:'10-Minuten-Skizze', desc:'Zeichne irgendetwas 10 Minuten lang. Dein Zimmer, deine Hand, etwas aus dem Fenster. Keine Erwartungen.', why:'<strong>Warum:</strong> Kreativität ohne Ziel entsperrt mentale Energie, die sonst in Grübeln steckt.', diff:'Einfach' },
  { id:24, cat:'kreativ', emoji:'📷', title:'Foto des Tages', desc:'Mach heute ein Foto von etwas Alltäglichem — aber mach es absichtlich schön. Licht, Winkel, Kontrast.', why:'<strong>Warum:</strong> Absichtsvolles Sehen verändert, was man wahrnimmt. Ästhetik ist eine trainierbare Fähigkeit.', diff:'Einfach' },
  { id:25, cat:'kreativ', emoji:'🎼', title:'Playlist für heute', desc:'Bau eine Playlist, die genau deinen jetzigen Zustand beschreibt. Für dich, nicht zum Teilen.', why:'<strong>Warum:</strong> Musik verarbeitet Emotionen, die sich noch nicht in Worte fassen lassen.', diff:'Einfach' },
  { id:26, cat:'kreativ', emoji:'🍽️', title:'Etwas Neues kochen', desc:'Such ein einfaches Rezept, das du noch nie gemacht hast. Koch es heute. Das Ergebnis ist egal.', why:'<strong>Warum:</strong> Handwerk mit sichtbarem Ergebnis gibt sofortiges Erfolgserlebnis — rar in Übergangsphasen.', diff:'Mittel' },
  { id:27, cat:'kreativ', emoji:'💡', title:'Idee-Dump', desc:'Schreib 10 Minuten lang jede Idee auf, die dir in den Sinn kommt — App, Business, Lösung, irgendwas. Keine Bewertung.', why:'<strong>Warum:</strong> Der erste Schritt im Ideenprozess ist Quantität vor Qualität. Gehirn braucht Freiraum zum Spinnen.', diff:'Einfach' },
  { id:28, cat:'kreativ', emoji:'📖', title:'Kurzgeschichte beginnen', desc:'Schreib die ersten 3 Sätze einer Geschichte — fiktiv, autobiografisch, alles erlaubt. Nur 3 Sätze.', why:'<strong>Warum:</strong> Narrative Verarbeitung hilft dem Gehirn, persönliche Erlebnisse einzuordnen und Distanz zu gewinnen.', diff:'Mittel' },
  { id:29, cat:'sozial', emoji:'🏡', title:'WG-Ritual vorschlagen', desc:'Schlage ein wöchentliches Mini-Ritual vor — gemeinsamer Sonntagskaffee, Filmabend, Abendessen. Etwas Wiederkehrendes.', why:'<strong>Warum:</strong> Rituale nehmen den Druck raus. Wenn etwas "immer" passiert, muss niemand mehr initiieren.', diff:'Fordern' },
  { id:30, cat:'kopf', emoji:'🌙', title:'Abend-Review', desc:'Nimm dir 5 Minuten vor dem Schlafen: Was lief gut heute? Was hat dich bewegt? Schreib 3 Zeilen.', why:'<strong>Warum:</strong> Reflektion verwandelt zufällige Erlebnisse in Lernstoff. Das Gehirn verarbeitet was es tagsüber nicht verarbeiten konnte.', diff:'Einfach' },
];

const COLORS = { sozial:'var(--blue)', koerper:'var(--green)', kopf:'var(--purple)', kreativ:'var(--amber)' };

let state = JSON.parse(localStorage.getItem('sparks_state') || '{}');
// state: { completed: {id: dateStr}, streak: N, lastDate: 'YYYY-MM-DD', filter: 'all' }
if (!state.completed) state.completed = {};
if (!state.streak) state.streak = 0;

let currentFilter = state.filter || 'all';
let currentChallenge = null;

function today() {
  return new Date().toISOString().slice(0,10);
}

function todayIndex() {
  const d = new Date();
  return Math.floor(d.getTime() / 86400000);
}

function save() {
  localStorage.setItem('sparks_state', JSON.stringify(state));
}

function setFilter(f) {
  currentFilter = f;
  state.filter = f;
  save();
  document.querySelectorAll('.filter').forEach(b => b.classList.toggle('active', b.dataset.c === f));
  renderAll();
}

function getFiltered() {
  if (currentFilter === 'all') return CHALLENGES;
  return CHALLENGES.filter(c => c.cat === currentFilter);
}

function getDailyChallenge() {
  const list = getFiltered();
  const idx = todayIndex() % list.length;
  return list[idx];
}

function isCompleted(id) {
  return state.completed[id] === today();
}

function renderAll() {
  currentChallenge = getDailyChallenge();
  renderMain();
  renderMini();
  updateStreak();
}

function renderMain() {
  const c = currentChallenge;
  const done = isCompleted(c.id);
  document.getElementById('main-card').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
      <div class="card-cat" data-c="${c.cat}">${catLabel(c.cat)}</div>
      <div class="card-diff">${diffDots(c.diff)} ${c.diff}</div>
    </div>
    <span class="card-emoji">${c.emoji}</span>
    <h2 class="card-title">${c.title}</h2>
    <p class="card-desc">${c.desc}</p>
    <div class="card-why">${c.why}</div>
    <div class="card-actions">
      <button class="btn-done ${done?'done-state':''}" onclick="markDone(${c.id})" id="done-btn">
        ${done ? '✓ Erledigt!' : 'Geschafft ✓'}
      </button>
      <button class="btn-skip" onclick="skipToNext()">Andere →</button>
    </div>
  `;
}

function renderMini() {
  const list = getFiltered().filter(c => c.id !== currentChallenge.id).slice(0, 4);
  document.getElementById('mini-list').innerHTML = list.map(c => `
    <div class="mini-card ${isCompleted(c.id)?'completed':''}" onclick="showChallenge(${c.id})">
      <span class="mini-emoji">${c.emoji}</span>
      <div class="mini-body">
        <div class="mini-title">${c.title}</div>
        <div class="mini-cat">${catLabel(c.cat)}</div>
      </div>
      <span class="mini-check">${isCompleted(c.id)?'✓':''}</span>
    </div>
  `).join('');
}

function showChallenge(id) {
  currentChallenge = CHALLENGES.find(c => c.id === id);
  renderMain();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

let skipIdx = 0;
function skipToNext() {
  const list = getFiltered().filter(c => c.id !== currentChallenge.id);
  skipIdx = (skipIdx + 1) % list.length;
  currentChallenge = list[skipIdx];
  renderMain();
  document.querySelector('.card-wrap').style.transform = 'scale(.97)';
  setTimeout(() => document.querySelector('.card-wrap').style.transform = '', 150);
}

function markDone(id) {
  if (isCompleted(id)) return;
  state.completed[id] = today();
  // Update streak
  const t = today();
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (state.lastDate === yesterday) {
    state.streak = (state.streak || 0) + 1;
  } else if (state.lastDate !== t) {
    state.streak = 1;
  }
  state.lastDate = t;
  save();
  renderAll();
  confetti();
  toast('🎉 Super gemacht!');
}

function updateStreak() {
  document.getElementById('streak-num').textContent = state.streak || 0;
}

function catLabel(cat) {
  return { sozial:'💙 Sozial', koerper:'💚 Körper', kopf:'💜 Kopf', kreativ:'🧡 Kreativ' }[cat] || cat;
}

function diffDots(d) {
  return { 'Einfach':'●○○', 'Mittel':'●●○', 'Fordern':'●●●' }[d] || '●○○';
}

function confetti() {
  const colors = ['#8b5cf6','#ec4899','#22c55e','#f59e0b','#60a5fa','#fff'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'}`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1300);
    }, i * 25);
  }
}

function shareChallenge() {
  const c = currentChallenge;
  const text = `✦ ${c.emoji} ${c.title}\n${c.desc}\n\nConnection Sparks · architect-dna.ch/sparks`;
  if (navigator.share) {
    navigator.share({ title: c.title, text });
  } else {
    navigator.clipboard?.writeText(text);
    toast('Kopiert!');
  }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2200);
}

// Init filter buttons
document.querySelectorAll('.filter').forEach(b => b.classList.toggle('active', b.dataset.c === currentFilter));
renderAll();
</script>
</body>
