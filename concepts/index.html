<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Concepts — architect-dna</title>
<style>
  :root{
    --bg:#fafaf8; --card:#fff; --ink:#141414; --ink2:rgba(20,20,20,.6); --ink3:rgba(20,20,20,.35);
    --border:rgba(20,20,20,.1); --red:#b5342a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  header{padding:28px 20px 8px;max-width:980px;margin:0 auto}
  h1{font-size:22px;margin:0 0 4px;letter-spacing:-.01em}
  .sub{font-size:13px;color:var(--ink2);margin:0}
  main{max-width:980px;margin:0 auto;padding:16px 20px 80px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:16px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:8px;min-height:150px}
  .card:hover{border-color:var(--red);box-shadow:0 6px 24px rgba(0,0,0,.06)}
  .card .tag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--red);font-weight:700}
  .card h3{font-size:16px;margin:0;line-height:1.3}
  .card p{font-size:13px;color:var(--ink2);margin:0;line-height:1.45;flex:1}
  .card .foot{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--ink3)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--ink3)}
  .dot.has-note{background:var(--red)}
  /* editor overlay */
  #overlay{position:fixed;inset:0;background:rgba(20,20,20,.4);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:50}
  #overlay.open{display:flex}
  #sheet{background:var(--card);width:100%;max-width:640px;border-radius:20px 20px 0 0;padding:24px;max-height:88vh;overflow:auto;box-shadow:0 -20px 60px rgba(0,0,0,.2)}
  @media(min-width:700px){
    #overlay{align-items:center}
    #sheet{border-radius:20px;max-height:80vh}
  }
  #sheet .tag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--red);font-weight:700}
  #sheet h2{margin:6px 0 6px;font-size:20px}
  #sheet .desc{font-size:13.5px;color:var(--ink2);line-height:1.5;margin:0 0 16px}
  #sheet textarea{width:100%;min-height:220px;border:1px solid var(--border);border-radius:10px;padding:14px;font-size:14px;font-family:inherit;line-height:1.5;resize:vertical;background:var(--bg);color:var(--ink)}
  #sheet textarea:focus{outline:none;border-color:var(--red)}
  .sheet-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
  #save-status{font-size:12px;color:var(--ink3)}
  #close-btn{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer}
  #close-btn:hover{background:#000}
</style>
</head>
<body>

<header>
  <h1>Concepts</h1>
  <p class="sub">15 project ideas to brainstorm. Tap a card, jot notes — they save automatically and are here when you're back on the laptop.</p>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<div id="overlay">
  <div id="sheet">
    <div class="tag" id="s-tag"></div>
    <h2 id="s-title"></h2>
    <p class="desc" id="s-desc"></p>
    <textarea id="s-notes" placeholder="Type your thoughts here…"></textarea>
    <div class="sheet-foot">
      <span id="save-status">&nbsp;</span>
      <button id="close-btn">Close</button>
    </div>
  </div>
</div>

<script>
const CONCEPTS = [
  { id:"sozialhilfe-copilot", tag:"Social impact", title:"Sozialhilfe Copilot",
    desc:"A rights-companion app for Swiss welfare recipients — tracks Fristen, auto-drafts Einsprache/Beschwerde templates, explains SKOS rules in plain language. Built straight out of your own case this year; real, underserved market." },
  { id:"coinjar", tag:"Social impact", title:"CoinJar",
    desc:"A Sozialhilfe-safe income calculator — shows exactly how much extra income you can earn before it gets clawed back (SKOS anrechnung rules). Productizes the domain expertise you were forced to learn the hard way." },
  { id:"passkey-vault", tag:"Privacy tool", title:"Passkey Vault",
    desc:"Dead-simple passwordless credential manager for small Swiss businesses — WebAuthn/passkeys only, no master password. Matches the Architect-DNA brand promise already on your homepage." },
  { id:"quietdns", tag:"Privacy tool", title:"QuietDNS",
    desc:"One-click, non-technical privacy config tool for home networks — a Pi-hole-lite wizard for people who don't want to touch a terminal. 'No tracking' as a product, not just a slogan." },
  { id:"ivory", tag:"Hobby → app", title:"Ivory",
    desc:"A minimalist piano practice tracker: metronome, streaks, sight-reading drills. Small, personal, shippable in a weekend — scratches your own itch first." },
  { id:"zimmer", tag:"Hobby → app", title:"Zimmer",
    desc:"An interior-design moodboard/room-planner web app in your 'fusion style' — drag furniture, generate palettes, save room concepts. Ties directly to your own interest." },
  { id:"sketchline", tag:"Hobby → app", title:"Sketchline",
    desc:"A distraction-free daily drawing-prompt app with streaks and a private gallery. Low scope, could double as your own practice tool." },
  { id:"fylo", tag:"Freelance product", title:"Fylo",
    desc:"Invoicing + time tracking for Swiss freelancers — essentially productizing your own bimpb_invoice/bimpb_tracker tools for other people who don't want to build their own." },
  { id:"boxschule-widget", tag:"Freelance product", title:"Boxschule Booking Widget",
    desc:"A lightweight class-schedule/booking embed built for Boxschule Viktoria, designed reusable from day one so it can be resold to other local studios/gyms afterward." },
  { id:"waqt", tag:"Freelance product", title:"Waqt",
    desc:"Offline-first prayer-times + Adhan PWA for Swiss cities. A tightly-scoped spinoff of the Waswas work — sellable to the local Muslim community, low new-build effort." },
  { id:"loop", tag:"Open source", title:"Loop",
    desc:"A self-hosted, single-binary Kanban + daily-planner app — productizes bimpb_kanban/bimpb_daily for privacy-conscious indie users who want to own their data." },
  { id:"belp-board", tag:"Open source", title:"Belp Board",
    desc:"A hyperlocal bulletin/marketplace PWA for Belp — WG rooms, odd jobs, local postings. Grows directly out of your own room-hunting experience this year." },
  { id:"void-freq-rooms", tag:"Existing app", title:"VOID FREQ: Focus Rooms",
    desc:"Shared ambient soundscape + silent body-doubling timer, added as a feature to the already-shipped VOID FREQ app. Low-lift extension, not a new product." },
  { id:"fastlane-fixer", tag:"Service offering", title:"Fastlane-in-a-Box",
    desc:"A paid 48h service: 'I'll fix your broken iOS Fastlane / App Store Connect pipeline.' Zero new code — just productizes the exact debugging skill you already used on VOID FREQ." },
  { id:"wildcard", tag:"Wildcard", title:"Whatever you thought of on the train",
    desc:"Blank slot. Whatever idea shows up while you're out and about — drop it here before you forget it." },
];

const grid = document.getElementById('grid');
let notes = {};

function renderCards(){
  grid.innerHTML = '';
  CONCEPTS.forEach(c => {
    const has = notes[c.id] && notes[c.id].text && notes[c.id].text.trim().length > 0;
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `
      <div class="tag">${c.tag}</div>
      <h3>${c.title}</h3>
      <p>${c.desc}</p>
      <div class="foot"><span>${has ? 'Notes saved' : 'No notes yet'}</span><span class="dot ${has?'has-note':''}"></span></div>
    `;
    el.addEventListener('click', () => openSheet(c));
    grid.appendChild(el);
  });
}

const overlay = document.getElementById('overlay');
const sTag = document.getElementById('s-tag');
const sTitle = document.getElementById('s-title');
const sDesc = document.getElementById('s-desc');
const sNotes = document.getElementById('s-notes');
const saveStatus = document.getElementById('save-status');
let currentId = null;
let saveTimer = null;

function openSheet(c){
  currentId = c.id;
  sTag.textContent = c.tag;
  sTitle.textContent = c.title;
  sDesc.textContent = c.desc;
  sNotes.value = (notes[c.id] && notes[c.id].text) || '';
  saveStatus.textContent = ' ';
  overlay.classList.add('open');
  setTimeout(() => sNotes.focus(), 50);
}

function closeSheet(){
  overlay.classList.remove('open');
  currentId = null;
  renderCards();
}

document.getElementById('close-btn').addEventListener('click', closeSheet);
overlay.addEventListener('click', e => { if(e.target === overlay) closeSheet(); });

sNotes.addEventListener('input', () => {
  if(!currentId) return;
  notes[currentId] = { text: sNotes.value, updatedAt: Date.now() };
  saveStatus.textContent = 'Saving…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveNote(currentId, sNotes.value), 600);
});

async function saveNote(id, text){
  try {
    await fetch('/api/concepts/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, text })
    });
    if(currentId === id) saveStatus.textContent = 'Saved';
  } catch(e) {
    if(currentId === id) saveStatus.textContent = 'Save failed — check connection';
  }
}

async function loadNotes(){
  try {
    const r = await fetch('/api/concepts/get', { cache: 'no-store' });
    notes = await r.json();
  } catch(e) {
    notes = {};
  }
  renderCards();
}

loadNotes();
</script>

</body>
</html>
