function mkRng(seed){
  let s=seed>>>0;
  return()=>{s=(s+0x6D2B79F5)|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};
}

let landmarkMeshes=[],procMesh=null,gridMesh=null;
let buildingBoxes=[];
let drone=null;

function ll2xz(city,lat,lon){return{x:(lon-city.center.lon)*city.lonScale,z:-(lat-city.center.lat)*city.latScale};}

function bCol(h,bright){
  const t=Math.min(h/500,1);
  return bright
    ?new THREE.Color(0.04+t*0.7,0.22+t*0.68,1.0)
    :new THREE.Color(0.01+t*0.07,0.04+t*0.18,0.18+t*0.35);
}

function clearCity(){
  for(const m of landmarkMeshes){m.geometry.dispose();m.material.dispose();scene.remove(m);}
  landmarkMeshes=[];
  if(procMesh){procMesh.geometry.dispose();procMesh.material.dispose();scene.remove(procMesh);procMesh=null;}
  if(gridMesh){gridMesh.material.dispose();scene.remove(gridMesh);gridMesh=null;}
  buildingBoxes=[];
  if(drone){drone.dispose();drone=null;}
}

// ── DRONE ──────────────────────────────────────────────────────────────────
class Drone{
  constructor(){
    this.pos=new THREE.Vector3();
    this.vel=new THREE.Vector3();
    this.waypoint=new THREE.Vector3();
    this.speed=5.5;
    this._spawn();
    this._pickWaypoint();
    const mat=new THREE.MeshBasicMaterial({color:0x00ffcc,blending:THREE.AdditiveBlending,transparent:true,opacity:.95});
    this.body=new THREE.Mesh(new THREE.BoxGeometry(9,3,18),mat);
    scene.add(this.body);
    const gm=new THREE.MeshBasicMaterial({color:0x00ffcc,blending:THREE.AdditiveBlending,transparent:true,opacity:.13});
    this.glow=new THREE.Mesh(new THREE.SphereGeometry(24,8,6),gm);
    scene.add(this.glow);
    const d=this.waypoint.clone().sub(this.pos);d.y=0;
    this.vel.copy(d.length()>0?d.normalize().multiplyScalar(this.speed):new THREE.Vector3(this.speed,0,0));
  }
  _spawn(){
    const C=CITIES[currentCity],{x0,x1,z0,z1}=C.gridCfg;
    this.pos.set(x0+(x1-x0)*0.1+(Math.random()-.5)*(x1-x0)*0.2,180+Math.random()*80,z0+(z1-z0)*0.15);
  }
  _clearAt(x,z,y){
    for(const b of buildingBoxes)
      if(x>b.minX-10&&x<b.maxX+10&&z>b.minZ-10&&z<b.maxZ+10&&y<b.h+15) return false;
    return true;
  }
  _pickWaypoint(){
    const C=CITIES[currentCity],{x0,x1,z0,z1}=C.gridCfg;
    for(let i=0;i<40;i++){
      const x=x0+Math.random()*(x1-x0),z=z0+Math.random()*(z1-z0),y=60+Math.random()*280;
      if(this._clearAt(x,z,y)){this.waypoint.set(x,y,z);return;}
    }
    this.waypoint.set(0,300,0);
  }
  update(){
    const toWp=this.waypoint.clone().sub(this.pos);
    if(toWp.length()<90) this._pickWaypoint();
    const desired=toWp.clone().normalize().multiplyScalar(this.speed);
    const avoid=new THREE.Vector3();
    const RDIST=75;
    for(const b of buildingBoxes){
      const bcx=(b.minX+b.maxX)*.5,bcz=(b.minZ+b.maxZ)*.5;
      if(Math.abs(this.pos.x-bcx)+Math.abs(this.pos.z-bcz)>RDIST*4) continue;
      const cx=Math.max(b.minX,Math.min(this.pos.x,b.maxX));
      const cy=Math.max(0,Math.min(this.pos.y,b.h));
      const cz=Math.max(b.minZ,Math.min(this.pos.z,b.maxZ));
      const dx=this.pos.x-cx,dy=this.pos.y-cy,dz=this.pos.z-cz;
      const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if(dist<RDIST&&dist>0.1){
        const s=(RDIST-dist)/RDIST;
        avoid.x+=dx/dist*s*this.speed*5;
        avoid.y+=dy/dist*s*this.speed*2.5;
        avoid.z+=dz/dist*s*this.speed*5;
      }
    }
    avoid.y+=(this.waypoint.y-this.pos.y)*0.025;
    if(this.pos.y<38) avoid.y+=(38-this.pos.y)*0.8;
    const C=CITIES[currentCity],{x0,x1,z0,z1}=C.gridCfg;
    const PAD=120;
    if(this.pos.x<x0+PAD) avoid.x+=(x0+PAD-this.pos.x)*0.12;
    if(this.pos.x>x1-PAD) avoid.x-=(this.pos.x-(x1-PAD))*0.12;
    if(this.pos.z<z0+PAD) avoid.z+=(z0+PAD-this.pos.z)*0.12;
    if(this.pos.z>z1-PAD) avoid.z-=(this.pos.z-(z1-PAD))*0.12;
    const steer=desired.add(avoid);
    const hSteer=new THREE.Vector3(steer.x,0,steer.z);
    const vSteer=Math.max(-this.speed*.5,Math.min(this.speed*.5,steer.y));
    const tVel=new THREE.Vector3();
    if(hSteer.length()>0.01){hSteer.normalize();tVel.x=hSteer.x*this.speed;tVel.z=hSteer.z*this.speed;}
    tVel.y=vSteer;
    this.vel.lerp(tVel,0.07);
    this.pos.addScaledVector(this.vel,1);
    if(this.pos.y<35) this.pos.y=35;
    this.body.position.copy(this.pos);
    this.glow.position.copy(this.pos);
    const hv=new THREE.Vector3(this.vel.x,0,this.vel.z);
    if(hv.length()>0.1) this.body.rotation.y=Math.atan2(-hv.x,-hv.z);
    this.body.rotation.x=Math.atan2(-this.vel.y,hv.length())*0.4;
  }
  dispose(){
    scene.remove(this.body);scene.remove(this.glow);
    this.body.geometry.dispose();this.body.material.dispose();
    this.glow.geometry.dispose();this.glow.material.dispose();
  }
}

function buildCity(key){
  const C=CITIES[key];currentCity=key;
  clearCity();

  scene.background=new THREE.Color(C.bg);
  scene.fog=new THREE.FogExp2(C.fog,C.fogD);

  for(const [lat,lon,h,w,d,name,detail] of C.landmarks){
    const{x,z}=ll2xz(C,lat,lon);
    const geo=new THREE.BoxGeometry(w,h,d);
    const edges=new THREE.EdgesGeometry(geo);
    const mat=new THREE.LineBasicMaterial({color:bCol(h,true),transparent:true,opacity:1,blending:THREE.AdditiveBlending});
    const m=new THREE.LineSegments(edges,mat);
    m.position.set(x,h/2,z);
    m.userData={name,detail,h};
    scene.add(m);landmarkMeshes.push(m);
    geo.dispose();
    buildingBoxes.push({minX:x-w/2,maxX:x+w/2,minZ:z-d/2,maxZ:z+d/2,h});
  }

  const rng=mkRng(C.gridCfg.seed);
  const{avSp,stSp,x0,x1,z0,z1}=C.gridCfg;
  const pos=[],col=[];

  for(let ax=x0;ax<x1;ax+=avSp){
    for(let az=z0;az<z1;az+=stSp){
      const nb=1+Math.floor(rng()*3);
      for(let bi=0;bi<nb;bi++){
        const bx=ax+12+rng()*(avSp-24);
        const bz=az+8+rng()*(stSp-16);
        if(!C.inBounds(bx,bz)) continue;
        let skip=false;
        for(const lm of landmarkMeshes){const dx=lm.position.x-bx,dz=lm.position.z-bz;if(dx*dx+dz*dz<75*75){skip=true;break;}}
        if(skip) continue;
        const bw=14+rng()*32,bd=14+rng()*28,bh=C.hFn(bx,bz,rng);
        const by=bh/2,hw=bw/2,hh=bh/2,hd=bd/2;
        buildingBoxes.push({minX:bx-hw,maxX:bx+hw,minZ:bz-hd,maxZ:bz+hd,h:bh});
        const corners=[[bx-hw,by-hh,bz-hd],[bx+hw,by-hh,bz-hd],[bx+hw,by-hh,bz+hd],[bx-hw,by-hh,bz+hd],[bx-hw,by+hh,bz-hd],[bx+hw,by+hh,bz-hd],[bx+hw,by+hh,bz+hd],[bx-hw,by+hh,bz+hd]];
        const ep=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
        const c=bCol(bh,false);
        for(const[a,b]of ep){pos.push(...corners[a],...corners[b]);col.push(c.r,c.g,c.b,c.r,c.g,c.b);}
      }
    }
  }

  const pg=new THREE.BufferGeometry();
  pg.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  pg.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  procMesh=new THREE.LineSegments(pg,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.6,blending:THREE.AdditiveBlending}));
  scene.add(procMesh);

  const span=Math.max(x1-x0,z1-z0)*1.6;
  gridMesh=new THREE.GridHelper(span,Math.floor(span/130),new THREE.Color(C.grid),new THREE.Color(C.grid));
  gridMesh.material.transparent=true;gridMesh.material.opacity=.28;gridMesh.material.blending=THREE.AdditiveBlending;
  scene.add(gridMesh);

  document.getElementById('badge-src').textContent=C.src;
  document.getElementById('btn-nyc').classList.toggle('active',key==='nyc');
  document.getElementById('btn-syd').classList.toggle('active',key==='syd');
  bloom.strength=key==='syd'?1.3:1.6;

  drone=new Drone();
}

const RACE_COLS=22,RACE_ROWS=52,RACE_CELL=40,TRAIL_H=34,RACE_TICK=7;
let raceGrid,raceCycles=[],raceMeshes=[],raceFrame=0,raceOver=false,restartIn=0;

const RIDERS=[
  {hex:0xff6b00,css:'#ff6b00',name:'ARES',  col:11,row:4,  dir:[0,1]},
  {hex:0x00ffff,css:'#00ffff',name:'CYAN',  col:11,row:47, dir:[0,-1]},
  {hex:0xff00ff,css:'#ff00ff',name:'CYLON', col:2, row:26, dir:[1,0]},
  {hex:0x00ff44,css:'#00ff44',name:'UNIT',  col:19,row:26, dir:[-1,0]},
];

function gw(col,row){return{x:(col-RACE_COLS/2+.5)*RACE_CELL,z:(row-RACE_ROWS/2+.5)*RACE_CELL};}

class RaceCycle{
  constructor(cfg){
    this.col=cfg.col;this.row=cfg.row;this.dir=[...cfg.dir];
    this.hex=cfg.hex;this.css=cfg.css;this.name=cfg.name;
    this.alive=true;this.qDir=null;this.px=null;this.pz=null;
    const bm=new THREE.MeshBasicMaterial({color:cfg.hex,blending:THREE.AdditiveBlending,transparent:true,opacity:1});
    this.body=new THREE.Mesh(new THREE.BoxGeometry(10,7,22),bm);
    scene.add(this.body);raceMeshes.push(this.body);
    const gm=new THREE.MeshBasicMaterial({color:cfg.hex,blending:THREE.AdditiveBlending,transparent:true,opacity:.18});
    this.glow=new THREE.Mesh(new THREE.SphereGeometry(20,8,6),gm);
    scene.add(this.glow);raceMeshes.push(this.glow);
    raceGrid[cfg.row*RACE_COLS+cfg.col]=1;
    this._sync(0);
  }
  _sync(interp){
    const w=gw(this.col,this.row);
    const x=this.px!==null&&interp>0?this.px+(w.x-this.px)*interp:w.x;
    const z=this.pz!==null&&interp>0?this.pz+(w.z-this.pz)*interp:w.z;
    const y=TRAIL_H/2+5;
    this.body.position.set(x,y,z);this.glow.position.set(x,y,z);
    this.body.rotation.y=Math.atan2(-this.dir[0],this.dir[1]);
  }
  _wall(x0,z0,x1,z1){
    const mx=(x0+x1)/2,mz=(z0+z1)/2,dx=x1-x0,dz=z1-z0;
    const wm=new THREE.MeshBasicMaterial({color:this.hex,blending:THREE.AdditiveBlending,transparent:true,opacity:.75,side:THREE.DoubleSide});
    const wall=new THREE.Mesh(new THREE.PlaneGeometry(Math.sqrt(dx*dx+dz*dz)+1,TRAIL_H),wm);
    wall.position.set(mx,TRAIL_H/2,mz);wall.rotation.y=Math.atan2(dz,dx);
    scene.add(wall);raceMeshes.push(wall);
  }
  step(){
    if(!this.alive) return;
    if(this.qDir){this.dir=[...this.qDir];this.qDir=null;}
    const w0=gw(this.col,this.row);
    this.px=w0.x;this.pz=w0.z;
    const nc=this.col+this.dir[0],nr=this.row+this.dir[1];
    if(nc<0||nc>=RACE_COLS||nr<0||nr>=RACE_ROWS||raceGrid[nr*RACE_COLS+nc]!==0){this.kill();return;}
    this._wall(w0.x,w0.z,gw(nc,nr).x,gw(nc,nr).z);
    this.col=nc;this.row=nr;raceGrid[nr*RACE_COLS+nc]=1;
    this.aiDecide();
  }
  aiDecide(){
    // Weighted look-ahead: prefer moves with more open space
    const ds=[[1,0],[-1,0],[0,1],[0,-1]];
    let best=null,bestScore=-1;
    for(const[dc,dr]of ds){
      if(dc===-this.dir[0]&&dr===-this.dir[1]) continue;
      let c=this.col+dc,r=this.row+dr,score=0;
      for(let i=0;i<8;i++){
        if(c<0||c>=RACE_COLS||r<0||r>=RACE_ROWS||raceGrid[r*RACE_COLS+c]!==0) break;
        score++;c+=dc;r+=dr;
      }
      if(score>bestScore||(score===bestScore&&Math.random()<.4)){bestScore=score;best=[dc,dr];}
    }
    if(best) this.qDir=best;
  }
  kill(){
    this.alive=false;this.body.visible=false;this.glow.visible=false;
    // explosion flash
    const fm=new THREE.MeshBasicMaterial({color:this.hex,blending:THREE.AdditiveBlending,transparent:true,opacity:.6});
    const flash=new THREE.Mesh(new THREE.SphereGeometry(35,10,8),fm);
    const w=gw(this.col,this.row);flash.position.set(w.x,TRAIL_H/2+5,w.z);
    scene.add(flash);raceMeshes.push(flash);
    let age=0;
    const fade=setInterval(()=>{fm.opacity=Math.max(0,.6-age*.04);age++;if(age>15)clearInterval(fade);},16);
  }
  tick(interp){if(this.alive)this._sync(interp);}
}

function startRace(){
  for(const m of raceMeshes){if(m.geometry)m.geometry.dispose();if(m.material)m.material.dispose();scene.remove(m);}
  raceMeshes=[];raceCycles=[];raceOver=false;raceFrame=0;restartIn=0;
  raceGrid=new Uint8Array(RACE_COLS*RACE_ROWS);
  for(const cfg of RIDERS) raceCycles.push(new RaceCycle(cfg));
  updateHUD();
  document.getElementById('round-num').textContent='ROUND '+round;
}

function updateHUD(){
  const hud=document.getElementById('hud');
  hud.innerHTML='';
  for(const c of raceCycles){
    const row=document.createElement('div');
    row.className='cycle-row';
    row.innerHTML=`<div class="cycle-dot" style="background:${c.css};box-shadow:0 0 6px ${c.css}"></div><span class="cycle-name" style="color:${c.css}">${c.name}</span><span class="cycle-status">${c.alive?'ALIVE':'CRASHED'}</span>`;
    hud.appendChild(row);
  }
}

// Camera orbit state
let camAngle=0.4,camPhi=0.62,camRadius=1600;
const CAM_CENTER=new THREE.Vector3(0,TRAIL_H/2,0);

function updateRace(){
  raceFrame++;

  // Wait before restart
  if(restartIn>0){
    restartIn--;
    if(restartIn===0){round++;startRace();}
    return;
  }

  const interp=(raceFrame%RACE_TICK)/RACE_TICK;

  if(!raceOver&&raceFrame%RACE_TICK===0){
    for(const c of raceCycles) c.step();
    const alive=raceCycles.filter(c=>c.alive);
    if(alive.length<=1){
      raceOver=true;
      updateHUD();
      restartIn=180; // 3s then new round
    }
  }

  for(const c of raceCycles) c.tick(interp);
}

// ── CAMERA ─────────────────────────────────────────────────────────────────
// Slow cinematic orbit high above the race grid
function updateCamera(){
  const t=clock.getElapsedTime();
  // Slowly orbit with gentle altitude breathing
  camAngle=t*0.04;
  camPhi=0.58+Math.sin(t*0.07)*0.12;
  camRadius=1500+Math.sin(t*0.05)*200;

  const x=camRadius*Math.sin(camPhi)*Math.sin(camAngle);
  const y=camRadius*Math.cos(camPhi)+TRAIL_H;
  const z=camRadius*Math.sin(camPhi)*Math.cos(camAngle);
  camera.position.set(x,y,z);
  camera.lookAt(CAM_CENTER);
}

// ── ANIMATE ────────────────────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  frame++;

  updateRace();
  updateCamera();
  if(drone) drone.update();

  // Pulse landmark buildings
  const pulse=0.82+Math.sin(Date.now()*0.0009)*0.18;
  for(const lm of landmarkMeshes){
    lm.material.opacity=(0.65+Math.min(lm.userData.h/500,1)*0.35)*pulse;
  }

  composer.render();
}

// ── CONTROLS ───────────────────────────────────────────────────────────────
window.switchCity=key=>{
  buildCity(key);
  startRace();
};

window.addEventListener('resize',()=>{
  const W=innerWidth,H=innerHeight;
  camera.aspect=W/H;camera.updateProjectionMatrix();
  renderer.setSize(W,H);composer.setSize(W,H);bloom.resolution.set(W,H);
});

// ── INIT ───────────────────────────────────────────────────────────────────
buildCity('nyc');
startRace();
animate();
</script>
