<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clyedo — Quality Comedy, Zero Algorithm</title>
<meta name="description" content="Curated comedy. No recommendations. No rabbit hole. Just the good stuff.">
<meta name="theme-color" content="#0a0a0a">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;
  --text:#f5f5f0;--text2:rgba(245,245,240,.6);--text3:rgba(245,245,240,.32);
  --accent:#f5a623;--accent2:#ffcc66;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --font:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  --mono:'SF Mono','Fira Code','Courier New',monospace;
  --r:12px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:200;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px}
.logo{font-size:18px;font-weight:900;letter-spacing:-.04em;color:var(--text);text-decoration:none;flex-shrink:0}
.logo em{color:var(--accent);font-style:normal}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 34px;font-size:13px;color:var(--text);outline:none;font-family:var(--font);transition:border-color .15s}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--border2)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;color:var(--text3)}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.spin-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:12px;font-weight:800;letter-spacing:.04em;cursor:pointer;transition:filter .15s;font-family:var(--font)}
.spin-btn:hover{filter:brightness(1.1)}
.add-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;font-family:var(--font)}
.add-btn:hover{border-color:var(--border2);color:var(--text)}

/* ── CATEGORIES ── */
.cats{padding:16px 20px 0;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.cat-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.04em;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:.15s;font-family:var(--font);margin-bottom:12px}
.cat-btn:hover{border-color:var(--border2);color:var(--text2)}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#000}

/* ── GRID ── */
.grid-wrap{padding:24px 20px;max-width:1200px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
@media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr);gap:10px}}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative}
.card:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.card:active{transform:translateY(-1px)}
.thumb{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--bg3);display:block}
.thumb-placeholder{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,var(--bg3),var(--bg2))}
.card-body{padding:12px}
.card-comedian{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:4px;font-family:var(--mono)}
.card-title{font-size:13px;font-weight:700;line-height:1.35;color:var(--text);margin-bottom:6px}
.card-meta{display:flex;align-items:center;justify-content:space-between}
.card-cat{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:2px 7px;border:1px solid var(--border);border-radius:4px}
.card-year{font-size:10px;color:var(--text3);font-family:var(--mono)}
.card-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:44px;height:44px;background:rgba(245,166,35,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;transition:transform .2s cubic-bezier(.34,1.56,.64,1);pointer-events:none;margin-top:-36px}
.card:hover .card-play{transform:translate(-50%,-50%) scale(1)}

/* empty state */
.empty{text-align:center;padding:80px 20px;color:var(--text3)}
.empty p{font-size:14px;margin-top:8px}

/* ── PLAYER MODAL ── */
#player-overlay{
  position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
  animation:fadeIn .2s ease;
}
#player-overlay.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.player-wrap{width:90vw;max-width:1000px;position:relative}
.player-close{position:absolute;top:-44px;right:0;background:rgba(255,255,255,.1);border:none;color:var(--text);font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center}
.player-close:hover{background:rgba(255,255,255,.18)}
.player-iframe-wrap{position:relative;padding-top:56.25%;border-radius:12px;overflow:hidden;background:#000}
.player-iframe-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-info{margin-top:12px;display:flex;gap:12px;align-items:flex-start}
.player-comedian{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:4px;font-family:var(--mono)}
.player-title{font-size:16px;font-weight:800;color:var(--text);line-height:1.3}
.player-desc{font-size:13px;color:var(--text2);margin-top:4px;line-height:1.5}
.player-next{margin-left:auto;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;font-family:var(--font)}
.player-next:hover{border-color:var(--border2);color:var(--text)}

/* ── ADD PANEL ── */
#add-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.8);display:none;align-items:flex-end;justify-content:center}
#add-overlay.open{display:flex}
.add-panel{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:28px 24px 40px;width:100%;max-width:600px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.add-panel h2{font-size:18px;font-weight:900;letter-spacing:-.03em;margin-bottom:4px}
.add-panel p{font-size:13px;color:var(--text2);margin-bottom:20px}
.add-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:14px;color:var(--text);outline:none;font-family:var(--font);margin-bottom:8px;transition:border-color .15s}
.add-input:focus{border-color:var(--accent)}
.add-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.add-meta select,.add-meta input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);outline:none;font-family:var(--font);transition:border-color .15s}
.add-meta select:focus,.add-meta input:focus{border-color:var(--accent)}
.add-actions{display:flex;gap:8px;margin-top:16px}
.add-save{flex:1;background:var(--accent);color:#000;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;transition:filter .15s;font-family:var(--font)}
.add-save:hover{filter:brightness(1.08)}
.add-cancel{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:10px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;font-family:var(--font)}
.add-cancel:hover{border-color:var(--border2);color:var(--text)}
.yt-search-row{display:flex;gap:8px;align-items:center;margin-bottom:0}
.yt-search-row .add-input{flex:1;margin-bottom:0}
.yt-search-btn{white-space:nowrap;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:10px;padding:12px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;font-family:var(--font)}
.yt-search-btn:hover{border-color:#f00;color:#f00}
.add-error{font-size:12px;color:#ff4466;margin-top:4px;display:none}

/* ── FOOTER ── */
footer{padding:24px 20px;border-top:1px solid var(--border);text-align:center}
footer p{font-size:11px;color:var(--text3);font-family:var(--mono)}
footer a{color:var(--text3);text-decoration:none}
footer a:hover{color:var(--text2)}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="player-overlay" onclick="closePlayer(event)">
  <div class="player-wrap">
    <button class="player-close" onclick="closePlayerBtn()">×</button>
    <div class="player-iframe-wrap">
      <iframe id="player-iframe" allow="autoplay;fullscreen" allowfullscreen></iframe>
    </div>
    <div class="player-info">

        <div class="player-comedian" id="player-comedian"></div>
        <div class="player-title" id="player-title"></div>
        <div class="player-desc" id="player-desc"></div>
      </div>
      <button class="player-next" onclick="nextRandom()">Next 🎲</button>
    </div>
  </div>
</div>

<div id="add-overlay" onclick="closeAdd(event)">
  <div class="add-panel">
    <h2>Add a Video</h2>
    <div class="yt-search-row">
      <input class="add-input" id="yt-search-input" type="text" placeholder="Search YouTube…" onkeydown="if(event.key==='Enter')ytSearch()">

    </div>

    <div class="add-meta">
      <input id="add-comedian" type="text" placeholder="Comedian / Show">
      <select id="add-cat">
        <option value="standup">Standup</option>
        <option value="sketch">Sketch</option>
        <option value="british">British</option>
        <option value="classic">Classic</option>
        <option value="roast">Roast</option>
        <option value="other">Other</option>
      </select>
    </div>
    <input class="add-input" id="add-title" type="text" placeholder="Title (optional — auto-filled)">
    <div class="add-actions">
      <button class="add-cancel" onclick="closeAdd()">Cancel</button>
      <button class="add-save" onclick="saveAdd()">Add to Library ✓</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<header>
  <a class="logo" href="/"><em>C</em>lyedo</a>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" type="text" placeholder="Search comedian or title…" oninput="renderGrid()">
  </div>
  <div class="header-right">
    <button class="spin-btn" onclick="spinRandom()">🎲 Random</button>
    <button class="add-btn" onclick="openAdd()">＋ Add</button>
  </div>
</header>

<div class="cats" id="cats"></div>
<div class="grid-wrap"><div class="grid" id="grid"></div></div>

<footer>
  <p>Clyedo by <a href="/">Architect-DNA</a> · Quality comedy, zero algorithm · <a href="/">← Back</a></p>
</footer>

// ── RENDER ────────────────────────────────────────────────────────────────────
function buildCats(){
  const el = document.getElementById('cats');
  el.innerHTML = CATS.map(c=>
    `<button class="cat-btn${c.id===currentCat?' active':''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function getVisible(){
  const lib = getLibrary();
  const q = document.getElementById('search').value.trim().toLowerCase();
  return lib.filter(v => {
    const matchCat = currentCat === 'all' || v.cat === currentCat;
    const matchQ = !q || v.title.toLowerCase().includes(q) || v.comedian.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
}

function renderGrid(){
  const grid = document.getElementById('grid');
  const visible = getVisible();
  if(!visible.length){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div style="font-size:48px">🎭</div>
      <p>Nothing found. Try a different search or <button onclick="openAdd()" style="background:none;border:none;color:var(--accent);font-size:inherit;cursor:pointer;font-weight:700">add a video</button>.</p>
    </div>`;
    return;
  }
  grid.innerHTML = visible.map((v,i) => `
    <div class="card" onclick="openPlayer(${i})" data-id="${v.id}">
      <div style="position:relative">
        <img class="thumb" src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
          alt="${v.title}" loading="lazy">
        <div class="thumb-placeholder" style="display:none">${v.emoji||'🎤'}</div>
        <div class="card-play">▶</div>
      </div>
      <div class="card-body">
        <div class="card-comedian">${v.comedian}</div>
        <div class="card-title">${v.title}</div>
        <div class="card-meta">
          <span class="card-cat">${v.cat}</span>
          <span class="card-year">${v.year||''}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function setCat(id){ currentCat = id; buildCats(); renderGrid(); }

// ── PLAYER ────────────────────────────────────────────────────────────────────
function openPlayer(idx){
  const visible = getVisible();
  if(idx < 0 || idx >= visible.length) return;
  const v = visible[idx];
  playerIdx = idx;
  currentVideo = v;
  document.getElementById('player-iframe').src =
    `https://www.youtube-nocookie.com/embed/${v.id}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3`;
  document.getElementById('player-comedian').textContent = v.comedian;
  document.getElementById('player-title').textContent = v.title;
  document.getElementById('player-desc').textContent = v.desc || '';
  document.getElementById('player-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePlayerBtn(){
  document.getElementById('player-overlay').classList.remove('open');
  document.getElementById('player-iframe').src='';
  document.body.style.overflow='';
}
function closePlayer(e){ if(e.target===document.getElementById('player-overlay')) closePlayerBtn(); }

function nextRandom(){
  const visible = getVisible();
  if(!visible.length) return;
  let next = playerIdx;
  while(next === playerIdx && visible.length > 1) next = Math.floor(Math.random()*visible.length);
  openPlayer(next);
}

// ── SPIN ──────────────────────────────────────────────────────────────────────
function spinRandom(){
  const visible = getVisible();
  if(!visible.length){ toast('No videos to spin!'); return; }
  openPlayer(Math.floor(Math.random()*visible.length));
}

// ── ADD PANEL ────────────────────────────────────────────────────────────────
function ytSearch(){
  const q = document.getElementById('yt-search-input').value.trim();
  if(!q) return;
  window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(q), '_blank', 'noopener');
}
function openAdd(){
  document.getElementById('add-overlay').classList.add('open');
  document.getElementById('yt-search-input').value='';
  document.getElementById('add-url').focus();
  document.body.style.overflow='hidden';
}
function closeAdd(e){
  if(e && e.target !== document.getElementById('add-overlay')) return;
  document.getElementById('add-overlay').classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('add-url').value='';
  document.getElementById('add-comedian').value='';
  document.getElementById('add-title').value='';
  document.getElementById('add-error').style.display='none';
}

function extractVideoId(url){
  const patterns = [
    /(?:v=|youtu\.be\/|embed\/|v\/|shorts\/)([A-Za-z0-9_-]{11})/,
    /^([A-Za-z0-9_-]{11})$/,
  ];
  for(const p of patterns){
    const m = url.trim().match(p);
    if(m) return m[1];
  }
  return null;
}

function saveAdd(){
  const url = document.getElementById('add-url').value.trim();
  const id = extractVideoId(url);
  if(!id){
    document.getElementById('add-error').style.display='block';
    return;
  }
  document.getElementById('add-error').style.display='none';
  const comedian = document.getElementById('add-comedian').value.trim() || 'Unknown';
  const title = document.getElementById('add-title').value.trim() || 'Untitled';
  const cat = document.getElementById('add-cat').value;
  const lib = getLibrary();
  if(lib.some(v=>v.id===id)){ toast('Already in your library!'); closeAdd({}); return; }
  lib.unshift({id, comedian, title, cat, year: new Date().getFullYear(), emoji:'🎤'});
  saveLibrary(lib);
  renderGrid();
  toast('Added to library ✓');
  closeAdd({});
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>el.classList.remove('show'), 2400);
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(document.getElementById('player-overlay').classList.contains('open')) closePlayerBtn();
    if(document.getElementById('add-overlay').classList.contains('open')) document.getElementById('add-overlay').classList.remove('open');
  }
  if(document.getElementById('player-overlay').classList.contains('open')){
    if(e.key==='ArrowRight'||e.key==='n') nextRandom();
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
buildCats();
renderGrid();
</script>
